<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Calendar Editor | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
<style>
  /* Calendar Editor specific styles */
  .cal-week-header {
    background: var(--dark2); border: 1px solid var(--subtle); border-radius: 12px;
    padding: 24px; margin-bottom: 24px;
  }
  .cal-week-header h2 { font-family: var(--font-heading); font-weight: 700; font-size: 20px; margin-bottom: 4px; }
  .cal-week-header .theme { color: var(--teal); font-size: 14px; font-weight: 400; margin-bottom: 8px; }
  .cal-week-header .strategy { color: var(--muted); font-size: 13px; line-height: 1.6; }

  .cal-day { margin-bottom: 24px; }
  .cal-day-label {
    font-family: var(--font-heading); font-weight: 700; font-size: 16px;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted);
    margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--subtle);
  }

  .cal-entry {
    background: var(--dark2); border: 1px solid var(--subtle); border-radius: 10px;
    padding: 16px; margin-bottom: 10px; transition: all 0.2s;
    display: grid; grid-template-columns: 1fr auto; gap: 12px;
  }
  .cal-entry:hover { border-color: rgba(0,229,204,0.3); }
  .cal-entry.editing { border-color: var(--teal); background: var(--dark3); }

  .cal-entry-main { flex: 1; }
  .cal-entry-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .cal-entry-topic { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .cal-entry-hook { font-size: 13px; color: var(--muted); line-height: 1.5; font-style: italic; margin-bottom: 8px; }
  .cal-entry-cta { font-size: 12px; color: var(--teal); }
  .cal-entry-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

  .cal-entry-image {
    width: 80px; height: 80px; border-radius: 8px; object-fit: cover;
    border: 1px solid var(--subtle); cursor: pointer;
  }
  .cal-entry-image-placeholder {
    width: 80px; height: 80px; border-radius: 8px; border: 2px dashed var(--subtle);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    color: var(--muted); font-size: 11px; text-align: center; transition: all 0.2s;
  }
  .cal-entry-image-placeholder:hover { border-color: var(--teal); color: var(--teal); }

  .funnel-tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .funnel-tag.awareness { background: rgba(74,144,217,0.15); color: var(--blue); }
  .funnel-tag.consideration { background: rgba(155,89,182,0.15); color: var(--purple); }
  .funnel-tag.decision { background: rgba(0,229,204,0.15); color: var(--teal); }
  .funnel-tag.engagement { background: rgba(255,184,0,0.15); color: var(--yellow); }

  /* Edit form (inline) */
  .edit-form { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--subtle); }
  .edit-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .edit-form label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
  .edit-form input, .edit-form select, .edit-form textarea {
    width: 100%; background: var(--dark2); border: 1px solid var(--subtle); color: var(--white);
    padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: var(--font-body);
  }
  .edit-form textarea { resize: vertical; min-height: 60px; }
  .edit-form input:focus, .edit-form select:focus, .edit-form textarea:focus { outline: none; border-color: var(--teal); }

  .image-url-input { display: flex; gap: 8px; align-items: end; }
  .image-url-input input { flex: 1; }

  .btn-xs { padding: 4px 10px; font-size: 10px; border-radius: 4px; }

  .lead-magnet-card {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid var(--teal); border-radius: 12px; padding: 20px; margin-bottom: 24px;
  }
  .lead-magnet-card h3 { font-family: var(--font-heading); font-weight: 700; color: var(--teal); margin-bottom: 4px; }
  .lead-magnet-card p { font-size: 13px; color: var(--muted); }

  .approve-bar {
    position: sticky; bottom: 0; background: var(--dark); border-top: 1px solid var(--subtle);
    padding: 16px 0; display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1>Content <span>Calendar Editor</span></h1>
        <div class="date" id="clientLabel"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="clientPicker" style="display:none;background:var(--dark2);border:1px solid var(--subtle);color:var(--white);padding:8px 14px;border-radius:8px;font-size:14px;font-family:var(--font-body)" onchange="switchClient(this.value)">
          <option value="">Select Client...</option>
        </select>
        <button class="btn-outline btn-small" onclick="addEntry()">+ Add Post</button>
        <button class="btn-outline btn-small" onclick="generateCalendar()">Regenerate Week</button>
      </div>
    </div>

    <div id="calendarContent"></div>
    <div class="loading" id="loading"><div class="spinner"></div><p>Loading calendar...</p></div>

    <div class="approve-bar" id="approveBar" style="display:none">
      <div>
        <span id="entryCount" style="color:var(--muted);font-size:14px"></span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline" onclick="saveCalendar()">Save Draft</button>
        <button class="btn-magenta" onclick="approveCalendar()" style="font-size:14px;padding:12px 28px">
          Approve Week & Generate Content
        </button>
      </div>
    </div>
  </main>
</div>

<script src="/nb-admin-shared.js"></script>
<script>
  const clientSlug = new URLSearchParams(window.location.search).get('client') || '';
  let calendarData = null;
  let entries = [];
  let clientName = '';
  let editingIdx = null;

  function switchClient(slug) {
    if (slug) {
      window.location.href = '/nb-admin-calendar-edit?client=' + encodeURIComponent(slug);
    }
  }

  async function init() {
    const ok = await NB_ADMIN.checkAuth();
    if (!ok) return;
    NB_ADMIN.renderSidebar('calendar');

    // Load clients for picker
    const allClients = await NB_ADMIN.apiFetch('clients');
    if (allClients && allClients.clients.length) {
      const picker = document.getElementById('clientPicker');
      allClients.clients.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.client_id;
        opt.textContent = c.client_name;
        if (c.client_id === clientSlug) opt.selected = true;
        picker.appendChild(opt);
      });
      picker.style.display = 'inline-block';

      // If no client in URL, show picker and wait
      if (!clientSlug) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('calendarContent').innerHTML = `
          <div class="empty-state">
            <div class="icon">&#128197;</div>
            <p>Select a client above to view their content calendar.</p>
          </div>`;
        return;
      }
    }

    // Load client info + strategy docs + calendar
    if (clientSlug) {
      const [clientRes, docsRes] = await Promise.all([
        NB_ADMIN.apiFetch('clients?id=' + encodeURIComponent(clientSlug)),
        NB_ADMIN.apiFetch('data?action=documents&client_id=' + encodeURIComponent(clientSlug)),
      ]);

      if (clientRes && clientRes.client) {
        clientName = clientRes.client.client_name;
        document.getElementById('clientLabel').textContent = clientName;
        window._clientInfo = clientRes.client;
      }

      // Parse strategy docs
      window._strategyDocs = {};
      if (docsRes && docsRes.documents) {
        for (const doc of docsRes.documents) {
          let cj = doc.content_json;
          if (typeof cj === 'string') try { cj = JSON.parse(cj); } catch {}
          if (cj && typeof cj === 'object') window._strategyDocs[doc.doc_type] = cj;
        }
      }

      await loadCalendar();
    }
  }

  async function loadCalendar() {
    const data = await NB_ADMIN.apiFetch('data?action=documents&client_id=' + encodeURIComponent(clientSlug) + '&doc_type=content_calendar');
    document.getElementById('loading').style.display = 'none';

    if (!data || !data.documents.length) {
      document.getElementById('calendarContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">&#128197;</div>
          <p>No content calendar yet for ${NB_ADMIN.esc(clientName)}.</p>
          <button class="btn-teal" style="margin-top:16px" onclick="generateCalendar()">Generate Week 1 Calendar</button>
        </div>`;
      return;
    }

    const doc = data.documents[0];
    calendarData = typeof doc.content_json === 'string' ? JSON.parse(doc.content_json) : doc.content_json;
    entries = calendarData.entries || [];

    renderCalendar();
  }

  function renderStrategyOverview() {
    const client = window._clientInfo || {};
    const docs = window._strategyDocs || {};
    const freq = client.posting_frequency || {};
    const platforms = client.platforms || [];
    const pillars = client.content_pillars || [];
    const positioning = docs.positioning || {};
    const messaging = docs.messaging_framework || {};
    const growth = docs.growth_strategy || {};
    const offers = docs.offer_strategy || {};

    // Build platform breakdown from frequency + calendar entries
    const platformBreakdown = [];
    for (const [p, count] of Object.entries(freq)) {
      // Try to figure out what kind of content goes on each platform
      let purpose = '';
      const pl = p.toLowerCase();
      if (pl === 'linkedin') purpose = 'thought leadership, strategic advice, lead magnets';
      else if (pl === 'instagram') purpose = 'visual content, behind-the-scenes, portfolio';
      else if (pl === 'facebook') purpose = 'community engagement, longer posts, group participation';
      else if (pl === 'tiktok') purpose = 'short-form video, hooks, viral potential';
      else if (pl === 'youtube') purpose = 'long-form content, tutorials, building in public';
      else if (pl === 'reddit') purpose = 'community engagement, value-first posts, AMA';
      else if (pl === 'pinterest') purpose = 'visual discovery, mood boards, product pins';
      else purpose = 'content distribution';

      platformBreakdown.push({ platform: p, count, purpose });
    }

    // Extract value proposition
    const valueProp = messaging.value_proposition || positioning.positioning_statement || '';
    const taglines = messaging.tagline_options || [];

    // Extract growth priorities
    let growthPriorities = [];
    const roadmap = growth.growth_roadmap_90day || [];
    if (roadmap.length) {
      growthPriorities = roadmap.slice(0, 2).map(r => r.focus_area || '');
    }

    // Extract offers
    let offerList = [];
    const offersArr = offers.offers || (Array.isArray(offers) ? offers : []);
    if (offersArr.length) {
      offerList = offersArr.slice(0, 3).map(o => o.name || '');
    }

    return `
      <div style="background:var(--dark2);border:1px solid var(--subtle);border-radius:12px;padding:24px;margin-bottom:20px">
        <div style="font-family:var(--font-heading);font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:0.04em;color:var(--teal);margin-bottom:16px">
          Content Marketing Strategy — ${NB_ADMIN.esc(clientName)}
        </div>

        ${valueProp ? `<div style="font-size:14px;color:var(--white);line-height:1.6;margin-bottom:16px;padding:12px 16px;border-left:3px solid var(--teal);background:rgba(0,229,204,0.05);border-radius:0 8px 8px 0">${NB_ADMIN.esc(valueProp)}</div>` : ''}

        <div style="font-family:var(--font-heading);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:10px">Platform Strategy</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-bottom:20px">
          ${platformBreakdown.map(p => `
            <div style="background:var(--dark3);border-radius:8px;padding:14px;border-left:3px solid var(--accent)">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <strong style="font-size:14px;text-transform:capitalize">${NB_ADMIN.esc(p.platform)}</strong>
                <span style="color:var(--teal);font-family:var(--font-heading);font-weight:800;font-size:18px">${p.count}/wk</span>
              </div>
              <div style="font-size:12px;color:var(--muted)">${NB_ADMIN.esc(p.purpose)}</div>
            </div>
          `).join('')}
        </div>

        ${pillars.length ? `
          <div style="font-family:var(--font-heading);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:8px">Content Pillars</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
            ${pillars.map(p => `<span style="padding:4px 12px;background:rgba(0,229,204,0.1);color:var(--teal);border-radius:6px;font-size:12px;font-weight:500">${NB_ADMIN.esc(typeof p === 'string' ? p : JSON.stringify(p))}</span>`).join('')}
          </div>
        ` : ''}

        ${growthPriorities.length ? `
          <div style="font-family:var(--font-heading);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:8px">Current Growth Focus</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:16px">
            ${growthPriorities.map(g => `<div style="margin-bottom:4px">→ ${NB_ADMIN.esc(g)}</div>`).join('')}
          </div>
        ` : ''}

        ${offerList.length ? `
          <div style="font-family:var(--font-heading);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);margin-bottom:8px">Active Offers</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.7)">
            ${offerList.map(o => `<div style="margin-bottom:4px">→ ${NB_ADMIN.esc(o)}</div>`).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  function renderCalendar() {
    if (!calendarData) return;

    // Strategy overview
    let html = renderStrategyOverview();

    // Week header
    html += `
      <div class="cal-week-header">
        <h2>Week ${calendarData.week || 1}: ${NB_ADMIN.esc(calendarData.theme || 'Content Calendar')}</h2>
        <div class="strategy">${NB_ADMIN.esc(calendarData.strategy_summary || '')}</div>
      </div>
    `;

    // Lead magnet
    if (calendarData.lead_magnet_title) {
      html += `
        <div class="lead-magnet-card">
          <h3>Lead Magnet: ${NB_ADMIN.esc(calendarData.lead_magnet_title)}</h3>
          <p>${NB_ADMIN.esc(calendarData.lead_magnet_description || '')}</p>
        </div>`;
    }

    // Group entries by day
    const days = {};
    const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    entries.forEach((e, i) => {
      const day = e.day_of_week || dayOrder[(i) % 7] || 'Unscheduled';
      if (!days[day]) days[day] = [];
      days[day].push({ ...e, _idx: i });
    });

    // Render each day
    for (const day of dayOrder) {
      const dayEntries = days[day];
      if (!dayEntries || !dayEntries.length) continue;

      html += `<div class="cal-day">
        <div class="cal-day-label">${NB_ADMIN.esc(day)} <span style="font-weight:400;font-size:12px;color:var(--subtle)">${dayEntries.length} posts</span></div>`;

      dayEntries.forEach(e => {
        const idx = e._idx;
        const isEditing = editingIdx === idx;
        const imgUrl = e.image_url || '';

        html += `
          <div class="cal-entry ${isEditing ? 'editing' : ''}" id="entry-${idx}">
            <div class="cal-entry-main">
              <div class="cal-entry-top">
                ${NB_ADMIN.platformBadge(e.platform || 'social')}
                <span class="funnel-tag ${(e.funnel_stage || '').toLowerCase()}">${NB_ADMIN.esc(e.funnel_stage || '?')}</span>
                <span style="font-size:11px;color:var(--muted)">${NB_ADMIN.esc(e.content_type || '')}</span>
              </div>
              <div class="cal-entry-topic">${NB_ADMIN.esc(e.topic || 'Untitled')}</div>
              ${e.hook ? `<div class="cal-entry-hook">"${NB_ADMIN.esc(e.hook)}"</div>` : ''}
              <div class="cal-entry-cta">[${NB_ADMIN.esc(e.cta_type || '?')}] ${NB_ADMIN.esc(e.cta_text || '')}</div>
              ${e.notes ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">Note: ${NB_ADMIN.esc(e.notes)}</div>` : ''}

              ${isEditing ? renderEditForm(e, idx) : ''}
            </div>
            <div class="cal-entry-actions">
              ${imgUrl
                ? `<img src="${imgUrl}" class="cal-entry-image" onclick="editImage(${idx})" title="Click to change image">`
                : `<div class="cal-entry-image-placeholder" onclick="editImage(${idx})">+ Image</div>`}
              <button class="btn-outline btn-xs" onclick="toggleEdit(${idx})">${isEditing ? 'Done' : 'Edit'}</button>
              <button class="btn-reject btn-xs" onclick="deleteEntry(${idx})">Remove</button>
            </div>
          </div>`;
      });

      html += '</div>';
    }

    document.getElementById('calendarContent').innerHTML = html;
    document.getElementById('approveBar').style.display = 'flex';
    document.getElementById('entryCount').textContent = `${entries.length} posts this week`;
  }

  function renderEditForm(e, idx) {
    return `
      <div class="edit-form">
        <div class="form-row">
          <div>
            <label>Topic</label>
            <input type="text" value="${NB_ADMIN.esc(e.topic || '')}" onchange="updateEntry(${idx},'topic',this.value)">
          </div>
          <div>
            <label>Platform</label>
            <select onchange="updateEntry(${idx},'platform',this.value)">
              ${['instagram','linkedin','facebook','tiktok','blog'].map(p =>
                `<option value="${p}" ${e.platform === p ? 'selected' : ''}>${p}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div>
          <label>Hook (scroll-stopping first line)</label>
          <textarea onchange="updateEntry(${idx},'hook',this.value)">${NB_ADMIN.esc(e.hook || '')}</textarea>
        </div>
        <div class="form-row" style="margin-top:10px">
          <div>
            <label>Funnel Stage</label>
            <select onchange="updateEntry(${idx},'funnel_stage',this.value)">
              ${['awareness','consideration','decision','engagement'].map(s =>
                `<option value="${s}" ${e.funnel_stage === s ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>
          </div>
          <div>
            <label>Content Type</label>
            <input type="text" value="${NB_ADMIN.esc(e.content_type || '')}" onchange="updateEntry(${idx},'content_type',this.value)">
          </div>
        </div>
        <div class="form-row" style="margin-top:10px">
          <div>
            <label>CTA Type</label>
            <select onchange="updateEntry(${idx},'cta_type',this.value)">
              ${['lead_magnet','case_study','book_consultation','engagement','website'].map(c =>
                `<option value="${c}" ${e.cta_type === c ? 'selected' : ''}>${c}</option>`
              ).join('')}
            </select>
          </div>
          <div>
            <label>CTA Text</label>
            <input type="text" value="${NB_ADMIN.esc(e.cta_text || '')}" onchange="updateEntry(${idx},'cta_text',this.value)">
          </div>
        </div>
        <div style="margin-top:10px">
          <label>Image URL</label>
          <div class="image-url-input">
            <input type="text" value="${NB_ADMIN.esc(e.image_url || '')}" onchange="updateEntry(${idx},'image_url',this.value)" placeholder="Paste image URL or click + Image">
            <button class="btn-outline btn-xs" onclick="searchImage(${idx})">Search</button>
          </div>
        </div>
        <div style="margin-top:10px">
          <label>Notes</label>
          <input type="text" value="${NB_ADMIN.esc(e.notes || '')}" onchange="updateEntry(${idx},'notes',this.value)" placeholder="Production notes...">
        </div>
      </div>`;
  }

  function toggleEdit(idx) {
    editingIdx = editingIdx === idx ? null : idx;
    renderCalendar();
  }

  function updateEntry(idx, field, value) {
    entries[idx][field] = value;
  }

  function deleteEntry(idx) {
    entries.splice(idx, 1);
    editingIdx = null;
    renderCalendar();
  }

  function addEntry() {
    entries.push({
      day_of_week: 'Monday',
      platform: 'instagram',
      funnel_stage: 'awareness',
      content_type: 'post',
      topic: 'New post — edit me',
      hook: '',
      goal: '',
      cta_type: 'lead_magnet',
      cta_text: '',
      image_url: '',
      notes: '',
    });
    editingIdx = entries.length - 1;
    renderCalendar();
    document.getElementById('entry-' + (entries.length - 1))?.scrollIntoView({ behavior: 'smooth' });
  }

  function editImage(idx) {
    const url = prompt('Paste image URL:', entries[idx].image_url || '');
    if (url !== null) {
      entries[idx].image_url = url;
      renderCalendar();
    }
  }

  async function searchImage(idx) {
    const topic = entries[idx].topic || 'professional';
    const platform = entries[idx].platform || 'instagram';
    const orientation = platform === 'instagram' ? 'square' : 'landscape';

    // Use Pexels via backend proxy
    try {
      const data = await NB_ADMIN.apiFetch(`data?action=service-pexels-search&query=${encodeURIComponent(topic)}&per_page=6&orientation=${orientation}`);
      if (data.photos && data.photos.length) {
        // Show a simple picker
        const urls = data.photos.map(p => p.src.large2x);
        const choice = prompt('Choose image (1-' + urls.length + '):\n' + urls.map((u, i) => `${i+1}. ${u.substring(0, 60)}...`).join('\n'), '1');
        const pick = parseInt(choice) - 1;
        if (pick >= 0 && pick < urls.length) {
          entries[idx].image_url = urls[pick];
          renderCalendar();
        }
      }
    } catch (e) {
      alert('Image search failed: ' + e.message);
    }
  }

  async function saveCalendar() {
    calendarData.entries = entries;
    const result = await NB_ADMIN.apiSend('data?action=save-doc', 'POST', {
      client_id: clientSlug,
      doc_type: 'content_calendar',
      content_json: calendarData,
    });
    if (result && result.success) {
      const msg = document.createElement('div');
      msg.style.cssText = 'position:fixed;top:80px;right:20px;background:var(--teal);color:var(--dark);padding:12px 24px;border-radius:8px;font-weight:600;z-index:999';
      msg.textContent = 'Calendar saved!';
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 2000);
    }
  }

  async function generateCalendar() {
    if (!clientSlug) {
      alert('Select a client first.');
      return;
    }
    if (entries.length && !confirm('Generate a new weekly calendar? This will replace the current one.')) return;

    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').innerHTML = '<div class="spinner"></div><p>Generating strategic calendar... (30-60 seconds)</p>';
    document.getElementById('calendarContent').innerHTML = '';
    document.getElementById('approveBar').style.display = 'none';

    const result = await NB_ADMIN.apiSend('pipeline', 'POST', {
      pipeline_name: 'generate_calendar',
      client_id: clientSlug,
    });

    if (result && result.run_id) {
      // Poll for completion
      const checkDone = async () => {
        const status = await NB_ADMIN.apiFetch('pipeline?run_id=' + result.run_id);
        if (status && (status.status === 'completed' || status.status === 'paused_review')) {
          await loadCalendar();
        } else if (status && status.status === 'running') {
          setTimeout(checkDone, 5000);
        } else {
          // Fallback: just wait and reload
          setTimeout(() => loadCalendar(), 10000);
        }
      };
      setTimeout(checkDone, 15000);
    } else {
      document.getElementById('loading').innerHTML = '<p style="color:#ff4444">Failed to start calendar generation. Is the agent server running?</p>';
    }
  }

  async function approveCalendar() {
    if (!confirm(`Approve all ${entries.length} posts and generate content?\n\nThis will:\n1. Save the calendar as approved\n2. Trigger the content generation pipeline\n3. Create blog posts, social posts, emails with images\n\nThis takes about 12 minutes.`)) return;

    // Save first
    calendarData.entries = entries;
    calendarData.status = 'approved';
    await NB_ADMIN.apiSend('data?action=save-doc', 'POST', {
      client_id: clientSlug,
      doc_type: 'content_calendar',
      content_json: calendarData,
      status: 'approved',
    });

    // Trigger content generation
    const result = await NB_ADMIN.apiSend('data?action=generate-from-calendar', 'POST', {
      client_id: clientSlug,
    });

    if (result && result.success) {
      const runId = result.pipeline?.run_id;
      document.getElementById('approveBar').innerHTML = `
        <div style="color:var(--teal);font-size:14px">
          Calendar approved! Content generation started.
          ${runId ? `<span style="color:var(--muted)">Run ID: ${runId}</span>` : ''}
        </div>
        <div style="display:flex;gap:8px">
          <a href="/nb-admin-pipelines" class="btn-outline btn-small">View Pipeline Progress</a>
          <a href="/nb-admin-client?id=${clientSlug}" class="btn-teal btn-small">View Client</a>
        </div>
      `;
    } else {
      alert('Failed to trigger content generation: ' + (result?.error || 'Unknown error'));
    }
  }

  init();
</script>
</body>
</html>
