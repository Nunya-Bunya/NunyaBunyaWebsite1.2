<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Docs | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
<style>
  .bd-filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .bd-filter-btn {
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--subtle);
    background: transparent; color: var(--muted); font-size: 13px; cursor: pointer;
    font-family: var(--font-heading); font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em; transition: all 0.2s;
  }
  .bd-filter-btn:hover { color: var(--white); border-color: var(--white); }
  .bd-filter-btn.active { color: var(--teal); border-color: var(--teal); background: rgba(0,229,204,0.05); }

  .bd-biz-group { margin-bottom: 32px; }
  .bd-biz-label {
    font-family: var(--font-heading); font-size: 18px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--subtle);
    display: flex; align-items: center; gap: 12px;
  }
  .bd-biz-dot { width: 10px; height: 10px; border-radius: 50%; }

  .bd-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 1000px) { .bd-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .bd-grid { grid-template-columns: 1fr; } }

  .bd-card {
    background: var(--dark2); border: 1px solid var(--subtle); border-radius: 12px;
    padding: 24px; transition: border-color 0.2s, transform 0.2s; cursor: pointer;
    text-decoration: none; color: inherit; display: block;
  }
  .bd-card:hover { border-color: var(--teal); transform: translateY(-2px); }

  .bd-card-icon { font-size: 28px; margin-bottom: 12px; }
  .bd-card-title {
    font-family: var(--font-heading); font-size: 16px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
  }
  .bd-card-desc { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.5; }

  .bd-viewer {
    display: none; position: fixed; top: 0; left: 240px; right: 0; bottom: 0;
    background: var(--dark); z-index: 50; overflow-y: auto; padding: 40px;
  }
  .bd-viewer.show { display: block; }
  .bd-viewer-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--subtle);
  }
  .bd-viewer-title { font-family: var(--font-heading); font-size: 24px; font-weight: 700; text-transform: uppercase; }
  .bd-viewer-close {
    background: none; border: 1px solid var(--subtle); color: var(--muted);
    padding: 8px 20px; border-radius: 8px; font-family: var(--font-heading);
    font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
    cursor: pointer; transition: all 0.2s;
  }
  .bd-viewer-close:hover { color: var(--teal); border-color: var(--teal); }
  .bd-viewer-content {
    max-width: 800px; font-size: 15px; line-height: 1.8; color: rgba(255,255,255,0.8); font-weight: 300;
  }
  .bd-viewer-content h1 { font-family: var(--font-heading); font-size: 28px; font-weight: 900; text-transform: uppercase; color: var(--white); margin: 32px 0 16px; }
  .bd-viewer-content h2 { font-family: var(--font-heading); font-size: 20px; font-weight: 700; text-transform: uppercase; color: var(--teal); margin: 28px 0 12px; }
  .bd-viewer-content h3 { font-family: var(--font-heading); font-size: 16px; font-weight: 700; text-transform: uppercase; color: var(--white); margin: 20px 0 8px; }
  .bd-viewer-content p { margin-bottom: 12px; }
  .bd-viewer-content ul, .bd-viewer-content ol { margin: 8px 0 16px 20px; }
  .bd-viewer-content li { margin-bottom: 6px; }
  .bd-viewer-content strong { color: var(--white); font-weight: 500; }
  .bd-viewer-content code { background: var(--dark3); padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--teal); }
  .bd-viewer-content table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  .bd-viewer-content th { text-align: left; padding: 10px 12px; background: var(--dark3); font-family: var(--font-heading); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--subtle); }
  .bd-viewer-content td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
  .bd-viewer-content pre { background: var(--dark3); padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin: 12px 0; }
  .bd-viewer-content blockquote { border-left: 3px solid var(--teal); padding-left: 16px; color: var(--muted); font-style: italic; margin: 12px 0; }
  .bd-viewer-content hr { border: none; border-top: 1px solid var(--subtle); margin: 24px 0; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1>Brand <span>Docs</span></h1>
        <div class="date">Foundational documents for every business</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="bd-filters" id="filterBar"></div>

    <!-- Document Grid -->
    <div id="docsGrid"></div>

  </main>
</div>

<!-- Document Viewer -->
<div class="bd-viewer" id="viewer">
  <div class="bd-viewer-header">
    <div class="bd-viewer-title" id="viewerTitle"></div>
    <button class="bd-viewer-close" onclick="closeViewer()">Close</button>
  </div>
  <div class="bd-viewer-content" id="viewerContent"></div>
</div>

<script src="/nb-admin-shared.js"></script>
<script>
const BRANDS = [
  {
    name: 'Nunya Bunya',
    id: 'nunya-bunya',
    color: '#00E5CC',
    docs: [
      { title: 'Style Guide', icon: '&#127912;', desc: 'Visual identity, colours, typography, motion, voice', file: 'nunya-bunya/style-guide.md' },
      { title: 'Business Plan', icon: '&#128196;', desc: 'Mission, revenue model, targets, operations', file: 'nunya-bunya/business-plan.md' },
      { title: 'Competitive Analysis', icon: '&#128269;', desc: 'Market positioning, competitors, differentiators', file: 'nunya-bunya/competitive-analysis.md' },
      { title: 'SWOT Analysis', icon: '&#9878;', desc: 'Strengths, weaknesses, opportunities, threats', file: 'nunya-bunya/swot.md' },
    ]
  },
  {
    name: 'Power Portraits',
    id: 'power-portraits',
    color: '#FFB800',
    docs: [
      { title: 'Style Guide', icon: '&#127912;', desc: 'Visual identity, photography direction, voice', file: 'power-portraits/style-guide.md' },
      { title: 'Business Plan', icon: '&#128196;', desc: 'Two-tier pricing, targets, marketing strategy', file: 'power-portraits/business-plan.md' },
      { title: 'Competitive Analysis', icon: '&#128269;', desc: 'Brisbane headshot market, positioning', file: 'power-portraits/competitive-analysis.md' },
      { title: 'SWOT Analysis', icon: '&#9878;', desc: 'Strengths, weaknesses, opportunities, threats', file: 'power-portraits/swot.md' },
    ]
  },
  {
    name: 'Ben Alek Conner',
    id: 'ben-alek-conner',
    color: '#9B59B6',
    docs: [
      { title: 'Style Guide', icon: '&#127912;', desc: 'Cinematic identity, film grain, voice', file: 'ben-alek-conner/style-guide.md' },
      { title: 'Business Plan', icon: '&#128196;', desc: 'Dual creative/business model, revenue streams', file: 'ben-alek-conner/business-plan.md' },
      { title: 'Competitive Analysis', icon: '&#128269;', desc: 'Director + consultant positioning, market gaps', file: 'ben-alek-conner/competitive-analysis.md' },
      { title: 'SWOT Analysis', icon: '&#9878;', desc: 'Strengths, weaknesses, opportunities, threats', file: 'ben-alek-conner/swot.md' },
    ]
  },
];

let activeFilter = 'all';

async function init() {
  const ok = await NB_ADMIN.checkAuth();
  if (!ok) return;
  NB_ADMIN.renderSidebar('brand-docs');
  renderFilters();
  render();
  setupFilters();
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<button class="bd-filter-btn active" data-filter="all">All</button>` +
    BRANDS.map(b => `<button class="bd-filter-btn" data-filter="${b.id}">${b.name}</button>`).join('');
}

function render() {
  const filtered = activeFilter === 'all' ? BRANDS : BRANDS.filter(b => b.id === activeFilter);
  const grid = document.getElementById('docsGrid');

  grid.innerHTML = filtered.map((brand, gi) => `
    <div class="bd-biz-group" style="animation: fadeIn 0.3s ease ${gi * 80}ms both">
      <div class="bd-biz-label">
        <div class="bd-biz-dot" style="background: ${brand.color};"></div>
        ${brand.name}
      </div>
      <div class="bd-grid">
        ${brand.docs.map((doc, di) => `
          <a class="bd-card" onclick="openDoc('${doc.file}', '${brand.name} — ${doc.title}')" style="animation: fadeIn 0.3s ease ${(gi * 4 + di) * 60}ms both">
            <div class="bd-card-icon">${doc.icon}</div>
            <div class="bd-card-title">${doc.title}</div>
            <div class="bd-card-desc">${doc.desc}</div>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function openDoc(file, title) {
  document.getElementById('viewerTitle').textContent = title;
  document.getElementById('viewerContent').innerHTML = '<p style="color: var(--muted);">Loading...</p>';
  document.getElementById('viewer').classList.add('show');

  try {
    const res = await fetch(`/brand-docs/${file}`);
    if (!res.ok) throw new Error('Failed to load');
    const md = await res.text();
    document.getElementById('viewerContent').innerHTML = renderMarkdown(md);
  } catch (e) {
    document.getElementById('viewerContent').innerHTML = '<p style="color: var(--magenta);">Failed to load document.</p>';
  }
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('show');
}

function renderMarkdown(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^\| (.+)$/gm, (match) => {
      const cells = match.split('|').filter(c => c.trim()).map(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) return '';
      const tag = match.includes('---') ? 'th' : 'td';
      return '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
    })
    .replace(/((<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
    .replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .replace(/^(?!<[a-z])((?!<).+)$/gm, '<p>$1</p>')
    .replace(/<p><\/p>/g, '')
    .replace(/\n{2,}/g, '\n');
}

function setupFilters() {
  document.getElementById('filterBar').addEventListener('click', (e) => {
    if (!e.target.classList.contains('bd-filter-btn')) return;
    document.querySelectorAll('.bd-filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    render();
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

init();
</script>
</body>
</html>
