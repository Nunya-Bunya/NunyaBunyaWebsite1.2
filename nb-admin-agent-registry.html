/* Stats */
.stat-row { display: flex; gap: 16px; margin: 16px 0 0; flex-wrap: wrap; }

.stat-pill span { color: var(--teal, #00D4AA); }

/* Filters */
.filter-bar { display: flex; gap: 12px; margin: 24px 0 16px; flex-wrap: wrap; align-items: center; }
.filter-bar input { background: var(--card-bg, #1a1f2e); border: 1px solid var(--border, #2a2f3e); color: var(--text, #e5e7eb); padding: 8px 14px; border-radius: 8px; font-size: 14px; width: 300px; font-family: 'Plus Jakarta Sans', sans-serif; }
.filter-bar input::placeholder { color: var(--muted, #6b7280); }
.filter-bar input:focus { outline: none; border-color: var(--teal, #00D4AA); }
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-pill { font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border, #2a2f3e); background: transparent; color: var(--text-secondary, #9ca3af); transition: all 0.15s; }
.filter-pill:hover { border-color: var(--teal, #00D4AA); color: var(--teal, #00D4AA); }
.filter-pill.active { background: rgba(0,212,170,0.12); border-color: var(--teal, #00D4AA); color: var(--teal, #00D4AA); font-weight: 600; }

/* Agent Table */
.agent-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.agent-table th { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted, #6b7280); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border, #2a2f3e); }
.agent-table td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid rgba(42,47,62,0.5); color: var(--text-secondary, #9ca3af); vertical-align: top; }
.agent-table tr:hover td { background: rgba(0,212,170,0.03); }
.agent-table tr.expanded td { background: rgba(0,212,170,0.05); border-bottom: none; }
.agent-name { font-weight: 600; color: var(--text, #e5e7eb); cursor: pointer; }
.agent-name:hover { color: var(--teal, #00D4AA); }
.agent-category { font-size: 11px; background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.15); color: var(--teal, #00D4AA); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.file-link { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--teal, #00D4AA); cursor: pointer; text-decoration: none; }
.file-link:hover { text-decoration: underline; }
.file-missing { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted, #6b7280); font-style: italic; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.paired { background: #00D4AA; }
.status-dot.directive-only { background: #f59e0b; }
.status-dot.script-only { background: #3b82f6; }

/* Expanded Content Viewer */
.agent-detail { display: none; }
.agent-detail.open { display: table-row; }
.agent-detail td { padding: 0; }
.detail-panel { background: rgba(0,0,0,0.25); border: 1px solid var(--border, #2a2f3e); border-top: none; margin: 0 12px 12px; border-radius: 0 0 8px 8px; }
.detail-tabs { display: flex; border-bottom: 1px solid var(--border, #2a2f3e); }
.detail-tab { padding: 10px 20px; font-size: 12px; font-weight: 600; color: var(--muted, #6b7280); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; font-family: 'Barlow Condensed', sans-serif; }
.detail-tab:hover { color: var(--text, #e5e7eb); }
.detail-tab.active { color: var(--teal, #00D4AA); border-bottom-color: var(--teal, #00D4AA); }
.detail-content { padding: 16px 20px; max-height: 500px; overflow-y: auto; }
.detail-content pre { font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; color: var(--text-secondary, #9ca3af); white-space: pre-wrap; word-break: break-word; margin: 0; }
.detail-content .loading-text { color: var(--muted, #6b7280); font-style: italic; }

/* Count badge */
.results-count { font-size: 13px; color: var(--muted, #6b7280); margin-left: auto; }

  { name: 'FD Embedded Attention', category: 'Foundational Demand', directive: 'fd_embedded_attention_agent.md', script: null, purpose: 'Foundational demand attention capture' },
  { name: 'FD Media Agent', category: 'Foundational Demand', directive: 'fd_media_agent.md', script: null, purpose: 'Foundational demand media' },
  { name: 'FD Offer Agent', category: 'Foundational Demand', directive: 'fd_offer_agent.md', script: null, purpose: 'Foundational demand offers' },
  { name: 'FD Optimization Agent', category: 'Foundational Demand', directive: 'fd_optimization_agent.md', script: null, purpose: 'Foundational demand optimization' },
  { name: 'FD Outbound Agent', category: 'Foundational Demand', directive: 'fd_outbound_agent.md', script: null, purpose: 'Foundational demand outbound' },
  { name: 'FD Payment Agent', category: 'Foundational Demand', directive: 'fd_payment_agent.md', script: null, purpose: 'Foundational demand payments' },
  { name: 'FD Signal Agent', category: 'Foundational Demand', directive: 'fd_signal_agent.md', script: null, purpose: 'Foundational demand signal detection' },
];

// ── File reading via GitHub raw (since these are in a repo on Hetzner) ──
// For local review, we'll read from the NunyaBunyaAgents GitHub repo
const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/benalekconner/NunyaBunyaAgents/main';

// Cache for loaded file contents
const fileCache = {};

async function loadFileContent(type, filename) {
  if (!filename) return null;
  const key = `${type}/${filename}`;
  if (fileCache[key]) return fileCache[key];

  const dir = type === 'directive' ? 'Directives' : 'Execution';
  try {
    const res = await fetch(`${GITHUB_RAW_BASE}/${dir}/${filename}`);
    if (!res.ok) throw new Error(`${res.status}`);
    const text = await res.text();
    fileCache[key] = text;
    return text;
  } catch {
    // Fallback: try Hetzner API endpoint if you set one up
    return `[Could not load ${dir}/${filename} — file may need to be fetched from Hetzner directly]`;
  }
}

// ── Render Functions ──

function getCategories() {
  const cats = [...new Set(AGENTS.map(a => a.category))];
  return cats.sort();
}

function getStatus(agent) {
  if (agent.directive && agent.script) return 'paired';
  if (agent.directive && !agent.script) return 'directive-only';
  return 'script-only';
}

function renderStats() {
  const total = AGENTS.length;
  const paired = AGENTS.filter(a => a.directive && a.script).length;
  const directiveOnly = AGENTS.filter(a => a.directive && !a.script).length;
  const scriptOnly = AGENTS.filter(a => !a.directive && a.script).length;
  const categories = getCategories().length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-pill"><span>${total}</span> agents total</div>
    <div class="stat-pill"><span style="color:#00D4AA">${paired}</span> fully paired</div>
    <div class="stat-pill"><span style="color:#f59e0b">${directiveOnly}</span> directive only</div>
    <div class="stat-pill"><span style="color:#3b82f6">${scriptOnly}</span> script only</div>
    <div class="stat-pill"><span>${categories}</span> categories</div>
  `;
}

function renderFilters() {
  const cats = getCategories();
  document.getElementById('categoryFilters').innerHTML =
    `<button class="filter-pill active" data-cat="all">All</button>` +
    cats.map(c => `<button class="filter-pill" data-cat="${c}">${c}</button>`).join('');

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    });
  });
}

function getActiveCategory() {
  const active = document.querySelector('.filter-pill.active');
  return active ? active.dataset.cat : 'all';
}

function getFilteredAgents() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = getActiveCategory();

  return AGENTS.filter(a => {
    const matchCat = cat === 'all' || a.category === cat;
    const matchSearch = !search ||
      a.name.toLowerCase().includes(search) ||
      a.category.toLowerCase().includes(search) ||
      a.purpose.toLowerCase().includes(search) ||
      (a.directive || '').toLowerCase().includes(search) ||
      (a.script || '').toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
}

function renderTable() {
  const filtered = getFilteredAgents();
  const tbody = document.getElementById('agentBody');

  document.getElementById('resultsCount').textContent = `${filtered.length} of ${AGENTS.length} agents`;

  tbody.innerHTML = filtered.map((agent, i) => {
    const status = getStatus(agent);
    const id = `agent-${i}`;
    return `
      <tr id="${id}" onclick="toggleDetail('${id}', ${AGENTS.indexOf(agent)})">
        <td><span class="status-dot ${status}" title="${status.replace('-', ' ')}"></span></td>
        <td><span class="agent-name">${agent.name}</span></td>
        <td><span class="agent-category">${agent.category}</span></td>
        <td>${agent.directive ? `<span class="file-link">${agent.directive}</span>` : '<span class="file-missing">none</span>'}</td>
        <td>${agent.script ? `<span class="file-link">${agent.script}</span>` : '<span class="file-missing">none</span>'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${agent.purpose}</td>
      </tr>
      <tr class="agent-detail" id="${id}-detail">
        <td colspan="6">
          <div class="detail-panel">
            <div class="detail-tabs">
              ${agent.directive ? `<div class="detail-tab active" onclick="event.stopPropagation(); switchTab('${id}', 'directive', ${AGENTS.indexOf(agent)})">Directive</div>` : ''}
              ${agent.script ? `<div class="detail-tab ${!agent.directive ? 'active' : ''}" onclick="event.stopPropagation(); switchTab('${id}', 'script', ${AGENTS.indexOf(agent)})">Script</div>` : ''}
            </div>
            <div class="detail-content" id="${id}-content">
              <span class="loading-text">Click to load...</span>
            </div>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

async function toggleDetail(id, agentIdx) {
  const detail = document.getElementById(`${id}-detail`);
  const row = document.getElementById(id);

  if (detail.classList.contains('open')) {
    detail.classList.remove('open');
    row.classList.remove('expanded');
    return;
  }

  // Close all others
  document.querySelectorAll('.agent-detail.open').forEach(d => {
    d.classList.remove('open');
    d.previousElementSibling.classList.remove('expanded');
  });

  detail.classList.add('open');
  row.classList.add('expanded');

  const agent = AGENTS[agentIdx];
  const type = agent.directive ? 'directive' : 'script';
  const filename = agent.directive || agent.script;

  const contentEl = document.getElementById(`${id}-content`);
  contentEl.innerHTML = '<span class="loading-text">Loading...</span>';

  const content = await loadFileContent(type, filename);
  contentEl.innerHTML = `<pre>${escapeHtml(content || 'No content available')}</pre>`;
}

async function switchTab(id, type, agentIdx) {
  const agent = AGENTS[agentIdx];
  const filename = type === 'directive' ? agent.directive : agent.script;

  // Update active tab
  const panel = document.getElementById(`${id}-detail`).querySelector('.detail-panel');
  panel.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  const contentEl = document.getElementById(`${id}-content`);
  contentEl.innerHTML = '<span class="loading-text">Loading...</span>';

  const content = await loadFileContent(type, filename);
  contentEl.innerHTML = `<pre>${escapeHtml(content || 'No content available')}</pre>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Init ──
async function init() {
  const ok = await NB_ADMIN.checkAuth();
  if (!ok) return;
  NB_ADMIN.renderSidebar('agent-registry');

  renderStats();
  renderFilters();
  renderTable();

  document.getElementById('loading').style.display = 'none';

  // Live search
  document.getElementById('searchInput').addEventListener('input', renderTable);
}

init();
</script>
</body>
