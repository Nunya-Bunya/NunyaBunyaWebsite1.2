<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Brisbane Zinia Massage — Announcement Card</title>
<style>
  @page { size: 600px 600px; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d11; font-family: Arial, Helvetica, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; }
  .page-label { color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px; }
  .card { width: 600px; height: 600px; position: relative; background: #1a1a1e; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .geo { position: absolute; background: #222228; transform: rotate(45deg); }
  .g1 { width: 280px; height: 280px; top: -90px; left: -90px; }
  .g2 { width: 280px; height: 280px; top: -90px; right: -90px; }
  .g3 { width: 280px; height: 280px; bottom: -90px; left: -90px; }
  .g4 { width: 280px; height: 280px; bottom: -90px; right: -90px; }
  .g5 { width: 200px; height: 200px; top: -20px; left: -20px; background: #1e1e24; }
  .g6 { width: 200px; height: 200px; top: -20px; right: -20px; background: #1e1e24; }
  .line-t { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #5B7C5E, #C4A77D); }
  .line-b { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #C4A77D, #5B7C5E); }
  .corner-tr { position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 80px 80px 0; border-color: transparent #5B7C5E transparent transparent; }
  .corner-bl { position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-style: solid; border-width: 60px 0 0 60px; border-color: transparent transparent transparent #5B7C5E; }
  .content { position: relative; z-index: 20; display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }
  .logo { width: 56px; height: 56px; object-fit: contain; }
  .footer { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 10px; color: rgba(255,255,255,0.25); white-space: nowrap; z-index: 20; letter-spacing: 1.5px; }
  .editable-field { background: transparent; border: none; border-bottom: 2px solid rgba(196,167,125,0.4); color: #fff; outline: none; font-family: Arial, sans-serif; text-align: center; }
  .editable-field:focus { border-bottom-color: #5B7C5E; }
  textarea.editable-field { border: 1px dashed rgba(255,255,255,0.15); border-radius: 4px; border-bottom: 1px dashed rgba(255,255,255,0.15); resize: none; padding: 10px 14px; line-height: 1.65; }
  textarea.editable-field:focus { border-color: #C4A77D; }
  .controls { margin-top: 24px; display: flex; gap: 12px; }
  .btn { padding: 10px 28px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .btn-s { background: #C4A77D; color: #1c1c1e; }
  @media print { body { background: #1a1a1e; padding: 0; } .controls, .page-label { display: none !important; } }

  .announce-label { font-size:11px; font-weight:900; letter-spacing:4px; text-transform:uppercase; color:#5B7C5E; margin-bottom:8px; }
  .announce-title { font-size:32px; font-weight:900; color:#fff; text-transform:uppercase; letter-spacing:2px; line-height:1.1; width:100%; }
  .announce-title em { color:#C4A77D; font-style:normal; }
  .announce-body { font-size:15px; color:rgba(255,255,255,0.7); line-height:1.6; width:100%; }
  .cta-badge { display:inline-block; padding:8px 22px; background:#5B7C5E; color:#fff; font-size:12px; font-weight:900; letter-spacing:2px; text-transform:uppercase; border-radius:2px; }
  .burst { position:absolute; top:20px; left:20px; width:70px; height:70px; background:#C4A77D; clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); opacity:0.15; }
