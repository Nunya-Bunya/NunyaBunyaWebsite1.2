<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Tracker | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Content <span>Tracker</span></h1>
      <div id="dateLabel" class="date"></div>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpis"></div>

    <!-- Filters -->
    <div class="toolbar">
      <select id="clientFilter" onchange="loadTracker()">
        <option value="">All Clients</option>
      </select>
      <select id="typeFilter" onchange="filterItems()">
        <option value="">All Types</option>
        <option value="blog">Blog Posts</option>
        <option value="social">Social Posts</option>
      </select>
      <select id="goalFilter" onchange="filterItems()">
        <option value="">All Goals</option>
        <option value="seo">SEO Ranking</option>
        <option value="lead_gen">Lead Generation</option>
        <option value="authority">Authority Building</option>
        <option value="awareness">Brand Awareness</option>
        <option value="conversion">Conversion</option>
      </select>
    </div>

    <!-- Content List -->
    <div id="trackerList"></div>
    <div class="loading" id="loading"><div class="spinner"></div><p>Loading content tracker...</p></div>
    <div class="empty-state" id="empty" style="display:none"><div class="icon">&#128203;</div><p>No published content yet.</p></div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-card large" style="max-width:820px;max-height:92vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:sticky;top:0;background:var(--dark2);padding-bottom:12px;z-index:2;">
      <h3 id="detailTitle"></h3>
      <button class="btn-outline btn-small" onclick="closeDetail()">Close</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<style>
.tracker-card {
  background: var(--dark2); border: 1px solid var(--subtle); border-radius: 12px;
  padding: 24px; margin-bottom: 16px; cursor: pointer; transition: border-color 0.2s;
}
.tracker-card:hover { border-color: var(--teal); }
.tracker-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.tracker-title { font-family: var(--font-heading); font-size: 18px; font-weight: 700; color: var(--white); }
.tracker-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
.tracker-meta .sep { color: var(--subtle); }
.tracker-excerpt { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.6); font-weight: 300; margin-bottom: 16px; }
.tracker-footer { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* Badges */
.badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge-blog { background: rgba(0,229,204,0.12); color: var(--teal); }
.badge-social { background: rgba(153,89,182,0.12); color: var(--purple); }
.badge-seo { background: rgba(74,144,217,0.12); color: var(--blue); }
.badge-lead_gen { background: rgba(255,45,120,0.12); color: var(--magenta); }
.badge-authority { background: rgba(255,184,0,0.12); color: var(--yellow); }
.badge-awareness { background: rgba(0,229,204,0.12); color: var(--teal); }
.badge-conversion { background: rgba(255,45,120,0.12); color: var(--magenta); }
.badge-client { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }

/* Metric chips */
.metric-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 11px; color: var(--muted); background: var(--dark3); border: 1px solid var(--subtle); }
.metric-chip .val { color: var(--white); font-weight: 600; }

/* Detail sections */
.detail-section { margin-bottom: 24px; }
.detail-section-label { font-family: var(--font-heading); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--teal); margin-bottom: 10px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.detail-card { background: var(--dark3); border: 1px solid var(--subtle); border-radius: 8px; padding: 16px; }
.detail-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.detail-card .value { font-size: 16px; font-weight: 600; color: var(--white); }
.detail-card .desc { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.goal-banner { background: var(--dark3); border-left: 3px solid var(--teal); padding: 16px 20px; border-radius: 0 8px 8px 0; margin-bottom: 20px; }
.goal-banner .goal-type { font-size: 11px; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.goal-banner .goal-desc { font-size: 15px; color: rgba(255,255,255,0.8); line-height: 1.5; }
.content-preview-box { background: var(--dark3); border: 1px solid var(--subtle); border-radius: 8px; padding: 20px; font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.75); max-height: 300px; overflow-y: auto; }
.content-preview-box h1,.content-preview-box h2,.content-preview-box h3 { font-family:var(--font-heading); color:var(--white); margin:16px 0 8px; }
.content-preview-box h1 { font-size:22px; } .content-preview-box h2 { font-size:18px; } .content-preview-box h3 { font-size:15px; }
.content-preview-box p { margin-bottom:10px; }
.platform-tag { display:inline-block; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-right:4px; }
.platform-tag.instagram { background:rgba(225,48,108,0.15); color:#E1306C; }
.platform-tag.linkedin { background:rgba(0,119,181,0.15); color:#0077B5; }
.platform-tag.facebook { background:rgba(66,103,178,0.15); color:#4267B2; }
.platform-tag.twitter { background:rgba(29,161,242,0.15); color:#1DA1F2; }

/* ── Phone Frame Mockup ── */
.phone-frame {
  width: 375px; max-width: 100%; margin: 0 auto; background: #000; border-radius: 40px;
  border: 3px solid #333; padding: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.phone-notch { width: 120px; height: 24px; background: #000; border-radius: 0 0 16px 16px; margin: 0 auto 8px; }
.phone-screen { background: #fff; border-radius: 28px; overflow: hidden; }

/* ── Instagram Mockup ── */
.ig-mock { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #262626; }
.ig-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; }
.ig-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); display: flex; align-items: center; justify-content: center; }
.ig-avatar-inner { width: 28px; height: 28px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #262626; }
.ig-username { font-size: 13px; font-weight: 600; }
.ig-image { width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, var(--dark3), var(--dark2)); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
.ig-actions { display: flex; gap: 14px; padding: 10px 14px; font-size: 22px; }
.ig-likes { padding: 0 14px; font-size: 13px; font-weight: 600; }
.ig-caption { padding: 4px 14px 14px; font-size: 13px; line-height: 1.5; }
.ig-caption strong { font-weight: 600; }
.ig-caption .hashtags { color: #00376b; }

/* ── LinkedIn Mockup ── */
.li-mock { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #000; background: #f3f2ef; }
.li-card { background: #fff; border: 1px solid #e0e0e0; margin: 8px; border-radius: 8px; overflow: hidden; }
.li-header { display: flex; gap: 10px; padding: 12px; }
.li-avatar { width: 48px; height: 48px; border-radius: 50%; background: #0077B5; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; }
.li-author { font-size: 14px; font-weight: 600; }
.li-headline { font-size: 12px; color: #666; }
.li-time { font-size: 12px; color: #666; }
.li-body { padding: 0 12px 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.li-actions-bar { display: flex; justify-content: space-around; padding: 8px 12px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #666; font-weight: 600; }

/* ── Facebook Mockup ── */
.fb-mock { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #050505; background: #f0f2f5; }
.fb-card { background: #fff; margin: 8px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); overflow: hidden; }
.fb-header { display: flex; gap: 10px; padding: 12px; }
.fb-avatar { width: 40px; height: 40px; border-radius: 50%; background: #1877f2; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
.fb-name { font-size: 14px; font-weight: 600; }
.fb-time { font-size: 12px; color: #65676b; }
.fb-body { padding: 0 12px 12px; font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
.fb-actions-bar { display: flex; justify-content: space-around; padding: 8px 12px; border-top: 1px solid #e0e0e0; font-size: 13px; color: #65676b; font-weight: 600; }

/* ── Blog Website Mockup ── */
.blog-mock { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid var(--subtle); }
.blog-mock-nav { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.blog-mock-nav img { height: 18px; }
.blog-mock-nav span { font-family: var(--font-heading); font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--white); }
.blog-mock-nav em { color: var(--teal); font-style: normal; }
.blog-mock-nav .nav-links { margin-left: auto; display: flex; gap: 20px; font-size: 12px; color: var(--muted); }
.blog-mock-hero { padding: 40px 32px 20px; }
.blog-mock-hero .tag { font-family: var(--font-heading); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--teal); margin-bottom: 10px; }
.blog-mock-hero .title { font-family: var(--font-heading); font-size: 28px; font-weight: 900; text-transform: uppercase; line-height: 1.1; color: var(--white); }
.blog-mock-hero .meta { font-size: 12px; color: var(--muted); margin-top: 10px; }
.blog-mock-body { padding: 20px 32px 32px; max-height: 400px; overflow-y: auto; font-size: 14px; line-height: 1.85; color: rgba(255,255,255,0.8); font-weight: 300; }
.blog-mock-body h2 { font-family: var(--font-heading); font-size: 18px; font-weight: 800; text-transform: uppercase; color: var(--teal); margin: 28px 0 10px; }
.blog-mock-body h3 { font-family: var(--font-heading); font-size: 15px; font-weight: 700; text-transform: uppercase; color: var(--white); margin: 20px 0 8px; }
.blog-mock-body p { margin-bottom: 14px; }
.blog-mock-body ul, .blog-mock-body ol { margin: 8px 0 16px 20px; }
.blog-mock-body li { margin-bottom: 6px; }
.blog-mock-body strong { color: var(--white); font-weight: 500; }
.blog-mock-body blockquote { border-left: 3px solid var(--teal); padding-left: 16px; color: var(--muted); font-style: italic; margin: 16px 0; }
</style>

<script src="/nb-admin-shared.js"></script>
<script>
let allItems = [];

async function init() {
  const ok = await NB_ADMIN.checkAuth();
  if (!ok) return;
  NB_ADMIN.renderSidebar('content-tracker');
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-AU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Load clients for filter
  const clientData = await NB_ADMIN.apiFetch('clients');
  if (clientData && clientData.clients) {
    const sel = document.getElementById('clientFilter');
    const seen = new Set();
    clientData.clients.forEach(c => {
      if (!seen.has(c.client_name)) {
        seen.add(c.client_name);
        const opt = document.createElement('option');
        opt.value = c.client_name;
        opt.textContent = c.client_name;
        sel.appendChild(opt);
      }
    });
  }

  await loadTracker();
}

async function loadTracker() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';

  const clientId = document.getElementById('clientFilter').value;
  let query = 'data?action=content-tracker&limit=100';
  if (clientId) query += '&client_id=' + encodeURIComponent(clientId);

  const data = await NB_ADMIN.apiFetch(query);
  document.getElementById('loading').style.display = 'none';

  allItems = data ? data.items || [] : [];
  renderKPIs(data ? data.stats : null);
  filterItems();
}

function renderKPIs(stats) {
  if (!stats) { document.getElementById('kpis').innerHTML = ''; return; }
  document.getElementById('kpis').innerHTML = `
    <div class="kpi-card"><div class="num">${stats.total}</div><div class="label">Published</div></div>
    <div class="kpi-card"><div class="num">${stats.blogs}</div><div class="label">Blog Posts</div></div>
    <div class="kpi-card purple"><div class="num">${stats.social}</div><div class="label">Social Posts</div></div>
    <div class="kpi-card yellow"><div class="num">${Object.keys(stats.by_client || {}).length}</div><div class="label">Clients Active</div></div>
  `;
}

function filterItems() {
  const typeFilter = document.getElementById('typeFilter').value;
  const goalFilter = document.getElementById('goalFilter').value;

  let filtered = allItems;
  if (typeFilter) filtered = filtered.filter(i => i.type === typeFilter);
  if (goalFilter) filtered = filtered.filter(i => i.goal && i.goal.type === goalFilter);

  if (!filtered.length) {
    document.getElementById('trackerList').innerHTML = '';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  renderList(filtered);
}

function renderList(items) {
  document.getElementById('trackerList').innerHTML = items.map(item => `
    <div class="tracker-card" onclick="showDetail('${item.id}')">
      <div class="tracker-header">
        <div class="tracker-title">${esc(item.title)}</div>
        <span class="badge badge-${item.type}">${item.type}</span>
      </div>
      <div class="tracker-meta">
        <span class="badge badge-client">${esc(item.client_name)}</span>
        <span class="badge badge-${item.goal.type}">${item.goal.label}</span>
        ${item.campaign ? `<span>${esc(item.campaign.name)}</span>` : ''}
        <span class="sep">|</span>
        <span>${formatDate(item.published_at || item.created_at)}</span>
      </div>
      ${item.content_preview ? `<div class="tracker-excerpt">${esc(item.content_preview)}</div>` : ''}
      <div class="tracker-footer">
        ${item.type === 'blog' ? renderBlogChips(item) : renderSocialChips(item)}
      </div>
    </div>
  `).join('');
}

function renderBlogChips(item) {
  const m = item.metrics || {};
  let chips = [];
  if (m.word_count) chips.push(`<span class="metric-chip"><span class="val">${m.word_count.toLocaleString()}</span> words</span>`);
  if (m.target_keyword) chips.push(`<span class="metric-chip">Keyword: <span class="val">${esc(m.target_keyword)}</span></span>`);
  if (m.has_social) chips.push(`<span class="metric-chip">+ Social</span>`);
  if (m.has_newsletter) chips.push(`<span class="metric-chip">+ Newsletter</span>`);
  if (m.has_ads) chips.push(`<span class="metric-chip">+ Ad Pack</span>`);
  return chips.join('');
}

function renderSocialChips(item) {
  const m = item.metrics || {};
  let chips = (m.platforms || []).map(p => `<span class="platform-tag ${p}">${p}</span>`);
  return chips.join('');
}

async function showDetail(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;

  document.getElementById('detailTitle').textContent = item.title;
  document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spinner"></div><p>Loading preview...</p></div>';
  document.getElementById('detailModal').classList.add('show');

  // Fetch full content from API
  const sourceType = item.type === 'blog' ? 'content_campaign' : 'social_post';
  const fullData = await NB_ADMIN.apiFetch(`approval?id=${id}&type=${sourceType}`);
  const full = fullData ? fullData.item : null;

  let html = '';

  // Goal banner
  html += `<div class="goal-banner">
    <div class="goal-type">${item.goal.label}</div>
    <div class="goal-desc">${esc(item.goal.description)}</div>
  </div>`;

  // Campaign & Metadata
  html += `<div class="detail-section">
    <div class="detail-section-label">Campaign & Context</div>
    <div class="detail-grid">
      <div class="detail-card"><div class="label">Campaign</div><div class="value">${esc(item.campaign ? item.campaign.name : 'Uncategorized')}</div></div>
      <div class="detail-card"><div class="label">Client</div><div class="value">${esc(item.client_name)}</div></div>
      <div class="detail-card"><div class="label">Type</div><div class="value">${item.type === 'blog' ? 'Blog Post' : 'Social Post'}</div></div>
      <div class="detail-card"><div class="label">Published</div><div class="value">${formatDate(item.published_at || item.created_at)}</div></div>
    </div>
  </div>`;

  // ── LIVE PREVIEW ──
  html += `<div class="detail-section"><div class="detail-section-label">Live Preview</div>`;

  if (item.type === 'blog' && full) {
    const md = full.blog_post || '';
    const titleMatch = md.match(/^#\s+(.+)/m);
    const title = titleMatch ? titleMatch[1].trim() : item.topic || 'Untitled';
    const date = new Date(item.published_at || item.created_at).toLocaleDateString('en-AU', { month: 'long', day: 'numeric', year: 'numeric' });
    const readTime = Math.max(1, Math.round(md.split(/\s+/).length / 200));
    const bodyHtml = renderMarkdown(md);

    html += `<div class="blog-mock">
      <div class="blog-mock-nav">
        <img src="/images/logo-icon-white.png" alt="NB" style="height:18px;">
        <span>NUNYA<em>BUNYA</em></span>
        <div class="nav-links"><span>Services</span><span>Work</span><span style="color:var(--teal)">Blog</span><span>About</span></div>
      </div>
      <div class="blog-mock-hero">
        <div class="tag">${esc(item.client_name)}</div>
        <div class="title">${esc(title)}</div>
        <div class="meta">${date} &middot; ${readTime} min read</div>
      </div>
      <div class="blog-mock-body">${bodyHtml}</div>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <a href="/blog-post?id=${item.id}" target="_blank" class="btn-outline btn-small" style="text-decoration:none;">Open Live Post &#8599;</a>
    </div>`;
  }

  if (item.type === 'social' && full) {
    let posts = full.posts;
    if (typeof posts === 'string') try { posts = JSON.parse(posts); } catch { posts = {}; }
    if (!posts) posts = {};

    const clientInitial = (item.client_name || 'N')[0].toUpperCase();
    const clientHandle = (item.client_name || 'nunyabunya').toLowerCase().replace(/\s+/g, '');

    // Instagram mockup
    if (posts.instagram) {
      const caption = typeof posts.instagram === 'string' ? posts.instagram : (posts.instagram.caption || posts.instagram.text || '');
      const hashtags = caption.match(/#\w+/g) || [];
      const mainText = caption.replace(/#\w+\s*/g, '').trim();

      html += `<div style="margin-bottom:24px;">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Instagram</div>
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="ig-mock">
              <div class="ig-header">
                <div class="ig-avatar"><div class="ig-avatar-inner">${clientInitial}</div></div>
                <div><div class="ig-username">${clientHandle}</div></div>
              </div>
              <div class="ig-image">Image placeholder</div>
              <div class="ig-actions">&#9825; &nbsp; &#128172; &nbsp; &#9993;</div>
              <div class="ig-caption"><strong>${clientHandle}</strong> ${escHtml(mainText)}${hashtags.length ? `<br><span class="hashtags">${hashtags.join(' ')}</span>` : ''}</div>
            </div>
          </div>
        </div>
      </div>`;
    }

    // LinkedIn mockup
    if (posts.linkedin) {
      const text = typeof posts.linkedin === 'string' ? posts.linkedin : (posts.linkedin.caption || posts.linkedin.text || '');
      html += `<div style="margin-bottom:24px;">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">LinkedIn</div>
        <div class="li-mock" style="border-radius:12px;overflow:hidden;max-width:500px;">
          <div class="li-card">
            <div class="li-header">
              <div class="li-avatar">${clientInitial}</div>
              <div>
                <div class="li-author">${esc(item.client_name)}</div>
                <div class="li-headline">Marketing &middot; Brisbane, QLD</div>
                <div class="li-time">Just now &middot; &#127760;</div>
              </div>
            </div>
            <div class="li-body">${escHtml(text.length > 500 ? text.slice(0, 500) + '... see more' : text)}</div>
            <div class="li-actions-bar"><span>&#128077; Like</span><span>&#128172; Comment</span><span>&#8634; Repost</span><span>&#9993; Send</span></div>
          </div>
        </div>
      </div>`;
    }

    // Facebook mockup
    if (posts.facebook) {
      const text = typeof posts.facebook === 'string' ? posts.facebook : (posts.facebook.caption || posts.facebook.text || '');
      html += `<div style="margin-bottom:24px;">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Facebook</div>
        <div class="fb-mock" style="border-radius:12px;overflow:hidden;max-width:500px;">
          <div class="fb-card">
            <div class="fb-header">
              <div class="fb-avatar">${clientInitial}</div>
              <div>
                <div class="fb-name">${esc(item.client_name)}</div>
                <div class="fb-time">Just now &middot; &#127760;</div>
              </div>
            </div>
            <div class="fb-body">${escHtml(text)}</div>
            <div class="fb-actions-bar"><span>&#128077; Like</span><span>&#128172; Comment</span><span>&#8680; Share</span></div>
          </div>
        </div>
      </div>`;
    }
  }

  html += `</div>`; // Close live preview section

  // ── METRICS ──
  if (item.type === 'blog') {
    const m = item.metrics || {};
    html += `<div class="detail-section">
      <div class="detail-section-label">Tracking Metrics</div>
      <div class="detail-grid">
        <div class="detail-card"><div class="label">Target Keyword</div><div class="value">${esc(m.target_keyword || 'None set')}</div><div class="desc">Track ranking in Google Search Console</div></div>
        <div class="detail-card"><div class="label">Word Count</div><div class="value">${m.word_count ? m.word_count.toLocaleString() : '—'}</div></div>
        <div class="detail-card"><div class="label">Companion Assets</div><div class="value">${[m.has_social && 'Social', m.has_newsletter && 'Newsletter', m.has_ads && 'Ads'].filter(Boolean).join(', ') || 'None'}</div></div>
        <div class="detail-card"><div class="label">SEO Keywords</div><div class="value">${(item.seo_keywords || []).join(', ') || 'None set'}</div></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">What to Track</div>
      <div style="background:var(--dark3);border:1px solid var(--subtle);border-radius:8px;padding:16px;">
        <ul style="margin:0;padding-left:18px;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.8;">
          <li><strong style="color:var(--white)">Organic traffic</strong> — Matomo page views for this blog URL</li>
          <li><strong style="color:var(--white)">Keyword ranking</strong> — Google Search Console position for "${esc(m.target_keyword || item.topic || 'target keyword')}"</li>
          <li><strong style="color:var(--white)">Time on page</strong> — Target: 2+ minutes</li>
          <li><strong style="color:var(--white)">CTA clicks</strong> — Clicks on booking or contact links</li>
          ${m.has_social ? '<li><strong style="color:var(--white)">Social engagement</strong> — Likes, comments, shares on companion posts</li>' : ''}
        </ul>
      </div>
    </div>`;
  }

  if (item.type === 'social') {
    html += `<div class="detail-section">
      <div class="detail-section-label">What to Track</div>
      <div style="background:var(--dark3);border:1px solid var(--subtle);border-radius:8px;padding:16px;">
        <ul style="margin:0;padding-left:18px;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.8;">
          <li><strong style="color:var(--white)">Reach</strong> — Unique accounts that saw this post</li>
          <li><strong style="color:var(--white)">Engagement rate</strong> — (likes + comments + shares) / reach</li>
          <li><strong style="color:var(--white)">Link clicks</strong> — Track via Shlink if CTA link included</li>
          <li><strong style="color:var(--white)">Profile visits</strong> — Did this drive people to the profile?</li>
          <li><strong style="color:var(--white)">Followers gained</strong> — Net change within 48 hours</li>
        </ul>
      </div>
    </div>`;
  }

  document.getElementById('detailContent').innerHTML = html;
}

function renderMarkdown(md) {
  md = md.replace(/^#\s+.+$/m, '');
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
    .replace(/((<li>.+<\/li>\n?)+)/g, '<ul>$1</ul>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^(?!<[a-z])((?!<).+)$/gm, '<p>$1</p>')
    .replace(/<p><\/p>/g, '')
    .replace(/\n{2,}/g, '\n');
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('show');
}

// Close modal on overlay click
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

function esc(s) { return NB_ADMIN.esc ? NB_ADMIN.esc(s || '') : String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

init();
</script>
