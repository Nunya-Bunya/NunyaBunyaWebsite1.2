<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | NB Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
</head>
<body>
<div class="login-screen">
  <div class="login-card">
    <h2>Nunya <span style="color:var(--teal)">Bunya</span></h2>
    <p>Enter your password to access the admin dashboard.</p>
    <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter')login()">
    <button class="btn-teal" onclick="login()">Access Dashboard</button>
    <p class="login-error" id="loginError">Invalid password. Try again.</p>
  </div>
</div>
<script>
  // If already authenticated, redirect to dashboard
  fetch('/api/auth').then(r => {
    if (r.ok) window.location.href = '/nb-admin-dashboard';
  });

  async function login() {
    const password = document.getElementById('password').value.trim();
    if (!password) return;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = '/nb-admin-dashboard';
      } else {
        errEl.style.display = 'block';
      }
    } catch {
      errEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
