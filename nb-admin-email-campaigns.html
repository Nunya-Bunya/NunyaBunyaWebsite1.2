<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Campaigns | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
<style>
  .ec-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--subtle); }
  .ec-tab {
    padding: 12px 24px; font-family: var(--font-heading); font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; color: var(--muted);
    border-bottom: 3px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .ec-tab:hover { color: var(--white); }
  .ec-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .ec-tab .badge-count {
    display: inline-block; background: rgba(0,229,204,0.15); color: var(--teal);
    padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; font-weight: 500;
  }

  .ec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .ec-grid { grid-template-columns: 1fr; } }

  .ec-card {
    background: var(--dark2); border: 1px solid var(--subtle); border-radius: 12px;
    padding: 20px; transition: border-color 0.2s;
  }
  .ec-card:hover { border-color: var(--teal); }

  .ec-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .ec-card-name { font-family: var(--font-heading); font-size: 16px; font-weight: 700; max-width: 80%; }
  .ec-card-status {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 3px 10px; border-radius: 6px; white-space: nowrap;
  }
  .ec-card-status.published { background: rgba(0,229,204,0.12); color: var(--teal); }
  .ec-card-status.draft { background: rgba(255,255,255,0.06); color: var(--muted); }

  .ec-stats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
  .ec-stat {
    text-align: center; padding: 10px 4px; background: var(--dark);
    border-radius: 8px; border: 1px solid var(--subtle);
  }
  .ec-stat-val { font-family: var(--font-heading); font-weight: 900; font-size: 20px; line-height: 1; }
  .ec-stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

  .ec-rate-bar { height: 4px; background: var(--subtle); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .ec-rate-fill { height: 100%; border-radius: 2px; }

  .ec-segment-list { margin-top: 16px; }
  .ec-segment {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .ec-segment:last-child { border-bottom: none; }
  .ec-segment-name { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 300; }
  .ec-segment-count { font-family: var(--font-heading); font-weight: 700; font-size: 16px; color: var(--teal); }

  .ec-campaign-events { margin-top: 12px; padding-left: 16px; border-left: 2px solid var(--subtle); }
  .ec-event {
    padding: 6px 0; font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 300;
    display: flex; align-items: center; gap: 8px;
  }
  .ec-event-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .ec-table-wrap {
    background: var(--dark2); border: 1px solid var(--subtle); border-radius: 12px; padding: 24px;
  }
  .ec-table { width: 100%; border-collapse: collapse; }
  .ec-table th {
    text-align: left; padding: 8px 12px; font-family: var(--font-heading); font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    border-bottom: 1px solid var(--subtle);
  }
  .ec-table td { padding: 10px 12px; font-size: 14px; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: 300; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1>Email <span>Campaigns</span></h1>
        <div class="date">Powered by Mautic</div>
      </div>
      <a href="https://mautic.nunyabunya.com" target="_blank" style="font-size:12px; color:var(--teal); text-decoration:none; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:0.06em;">Open Mautic &#8599;</a>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card"><div class="num" id="kpiEmails">—</div><div class="label">Total Emails</div></div>
      <div class="kpi-card"><div class="num" id="kpiCampaigns">—</div><div class="label">Active Campaigns</div></div>
      <div class="kpi-card magenta"><div class="num" id="kpiContacts">—</div><div class="label">Total Contacts</div></div>
      <div class="kpi-card"><div class="num" id="kpiSegments">—</div><div class="label">Segments</div></div>
    </div>

    <!-- Tabs -->
    <div class="ec-tabs">
      <button class="ec-tab active" onclick="switchTab('emails')">Emails <span class="badge-count" id="emailCount">0</span></button>
      <button class="ec-tab" onclick="switchTab('campaigns')">Campaigns <span class="badge-count" id="campaignCount">0</span></button>
      <button class="ec-tab" onclick="switchTab('segments')">Segments <span class="badge-count" id="segmentCount">0</span></button>
      <button class="ec-tab" onclick="switchTab('forms')">Forms <span class="badge-count" id="formCount">0</span></button>
    </div>

    <!-- Emails Tab -->
    <div id="tab-emails" class="tab-content active">
      <div class="ec-grid" id="emailGrid"></div>
    </div>

    <!-- Campaigns Tab -->
    <div id="tab-campaigns" class="tab-content">
      <div class="ec-grid" id="campaignGrid"></div>
    </div>

    <!-- Segments Tab -->
    <div id="tab-segments" class="tab-content">
      <div class="ec-table-wrap">
        <table class="ec-table">
          <thead><tr><th>Segment</th><th>Contacts</th><th>Status</th></tr></thead>
          <tbody id="segmentBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Forms Tab -->
    <div id="tab-forms" class="tab-content">
      <div class="ec-grid" id="formGrid"></div>
    </div>

    <div class="loading" id="loading"><div class="spinner"></div><p>Loading email data...</p></div>
  </main>
</div>

<script src="/nb-admin-shared.js"></script>
<script>
async function init() {
  const ok = await NB_ADMIN.checkAuth();
  if (!ok) return;
  NB_ADMIN.renderSidebar('email-campaigns');
  await loadAll();
}

async function mautic(endpoint, params = {}) {
  const qs = new URLSearchParams({ action: 'service-mautic', endpoint, ...params });
  return NB_ADMIN.apiFetch(`data?${qs.toString()}`);
}

async function loadAll() {
  document.getElementById('loading').style.display = 'flex';

  const [emails, campaigns, segments, forms, contacts] = await Promise.allSettled([
    mautic('emails', { limit: '50', orderBy: 'id', orderByDir: 'desc' }),
    mautic('campaigns', { limit: '20' }),
    mautic('segments', { limit: '30' }),
    mautic('forms', { limit: '30' }),
    mautic('contacts', { search: '!is:anonymous', limit: '1' }),
  ]);

  const emailData = emails.value || {};
  const campaignData = campaigns.value || {};
  const segmentData = segments.value || {};
  const formData = forms.value || {};
  const contactData = contacts.value || {};

  // KPIs
  document.getElementById('kpiEmails').textContent = emailData.total || 0;
  const activeCampaigns = Object.values(campaignData.campaigns || {}).filter(c => c.isPublished).length;
  document.getElementById('kpiCampaigns').textContent = activeCampaigns;
  document.getElementById('kpiContacts').textContent = contactData.total || 0;
  const segList = segmentData.lists || {};
  document.getElementById('kpiSegments').textContent = Object.keys(segList).length;

  // Tab counts
  document.getElementById('emailCount').textContent = emailData.total || 0;
  document.getElementById('campaignCount').textContent = Object.keys(campaignData.campaigns || {}).length;
  document.getElementById('segmentCount').textContent = Object.keys(segList).length;
  document.getElementById('formCount').textContent = formData.total || 0;

  renderEmails(emailData.emails || {});
  renderCampaigns(campaignData.campaigns || {});
  renderSegments(segList);
  renderForms(formData.forms || {});

  document.getElementById('loading').style.display = 'none';
}

function renderEmails(emails) {
  const grid = document.getElementById('emailGrid');
  const arr = Object.values(emails);
  if (!arr.length) { grid.innerHTML = '<p style="color:var(--muted);padding:20px;">No emails found.</p>'; return; }

  grid.innerHTML = arr.map((e, i) => {
    const sent = e.sentCount || 0;
    const read = e.readCount || 0;
    const clicked = e.clickCount || 0;
    const openRate = sent > 0 ? ((read / sent) * 100).toFixed(1) : '0.0';
    const clickRate = sent > 0 ? ((clicked / sent) * 100).toFixed(1) : '0.0';
    const openColor = openRate >= 25 ? 'var(--teal)' : openRate >= 15 ? 'var(--yellow)' : 'var(--magenta)';
    const status = e.isPublished ? 'published' : 'draft';

    return `
      <div class="ec-card" style="animation: fadeIn 0.3s ease ${i * 40}ms both">
        <div class="ec-card-top">
          <div class="ec-card-name">${e.name || 'Untitled'}</div>
          <div class="ec-card-status ${status}">${status}</div>
        </div>
        <div class="ec-stats">
          <div class="ec-stat">
            <div class="ec-stat-val" style="color: var(--white);">${sent}</div>
            <div class="ec-stat-label">Sent</div>
          </div>
          <div class="ec-stat">
            <div class="ec-stat-val" style="color: ${openColor};">${read}</div>
            <div class="ec-stat-label">Opened</div>
          </div>
          <div class="ec-stat">
            <div class="ec-stat-val" style="color: var(--teal);">${clicked}</div>
            <div class="ec-stat-label">Clicked</div>
          </div>
          <div class="ec-stat">
            <div class="ec-stat-val" style="color: ${openColor};">${openRate}%</div>
            <div class="ec-stat-label">Open Rate</div>
          </div>
        </div>
        <div class="ec-rate-bar">
          <div class="ec-rate-fill" style="width: ${openRate}%; background: ${openColor};"></div>
        </div>
      </div>`;
  }).join('');
}

function renderCampaigns(campaigns) {
  const grid = document.getElementById('campaignGrid');
  const arr = Object.values(campaigns);
  if (!arr.length) { grid.innerHTML = '<p style="color:var(--muted);padding:20px;">No campaigns found.</p>'; return; }

  grid.innerHTML = arr.map((c, i) => {
    const status = c.isPublished ? 'published' : 'draft';
    const events = c.events || [];
    const lists = c.lists || [];

    return `
      <div class="ec-card" style="animation: fadeIn 0.3s ease ${i * 60}ms both">
        <div class="ec-card-top">
          <div class="ec-card-name">${c.name || 'Untitled'}</div>
          <div class="ec-card-status ${status}">${status}</div>
        </div>
        <div style="font-size:13px; color:var(--muted); margin-bottom:8px;">${c.description || ''}</div>
        ${lists.length ? `<div style="font-size:12px; color:var(--muted); margin-bottom:8px;">Segments: ${lists.map(l => `<span style="color:var(--teal);">${l.name || l.id}</span>`).join(', ')}</div>` : ''}
        ${events.length ? `
          <div class="ec-campaign-events">
            ${events.slice(0, 8).map(e => {
              const color = e.eventType === 'action' ? 'var(--teal)' : e.eventType === 'condition' ? 'var(--yellow)' : 'var(--magenta)';
              return `<div class="ec-event"><div class="ec-event-dot" style="background:${color};"></div>${e.name || e.type}</div>`;
            }).join('')}
            ${events.length > 8 ? `<div class="ec-event" style="color:var(--muted);">+${events.length - 8} more steps</div>` : ''}
          </div>` : '<div style="font-size:12px; color:var(--muted);">No events configured</div>'}
      </div>`;
  }).join('');
}

function renderSegments(segments) {
  const body = document.getElementById('segmentBody');
  const arr = Object.values(segments);
  if (!arr.length) { body.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">No segments</td></tr>'; return; }

  body.innerHTML = arr.map(s => {
    const status = s.isPublished ? 'Active' : 'Draft';
    const statusColor = s.isPublished ? 'var(--teal)' : 'var(--muted)';
    return `
      <tr>
        <td>${s.name}</td>
        <td style="font-family:var(--font-heading); font-weight:700; color:var(--teal);">${s.alias || '—'}</td>
        <td style="color:${statusColor}; font-size:12px; text-transform:uppercase;">${status}</td>
      </tr>`;
  }).join('');
}

function renderForms(forms) {
  const grid = document.getElementById('formGrid');
  const arr = typeof forms === 'object' && !Array.isArray(forms) ? Object.values(forms) : (forms || []);
  if (!arr.length) { grid.innerHTML = '<p style="color:var(--muted);padding:20px;">No forms found.</p>'; return; }

  grid.innerHTML = arr.map((f, i) => {
    const status = f.isPublished ? 'published' : 'draft';
    const subs = f.submissionCount || 0;
    const fields = (f.fields || []).length;

    return `
      <div class="ec-card" style="animation: fadeIn 0.3s ease ${i * 40}ms both">
        <div class="ec-card-top">
          <div class="ec-card-name">${f.name || 'Untitled'}</div>
          <div class="ec-card-status ${status}">${status}</div>
        </div>
        <div class="ec-stats" style="grid-template-columns: 1fr 1fr;">
          <div class="ec-stat">
            <div class="ec-stat-val" style="color: var(--teal);">${subs}</div>
            <div class="ec-stat-label">Submissions</div>
          </div>
          <div class="ec-stat">
            <div class="ec-stat-val" style="color: var(--white);">${fields}</div>
            <div class="ec-stat-label">Fields</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.ec-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

init();
</script>
</body>
</html>
