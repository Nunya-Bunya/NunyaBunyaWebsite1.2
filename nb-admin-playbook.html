<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playbook | NBHQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/nb-admin-shared.js"></script>
  <style>
    :root {
      --dark: #0a0a0a;
      --dark2: #111111;
      --dark3: #1a1a1a;
      --teal: #00E5CC;
      --magenta: #FF2D78;
      --white: #ffffff;
      --muted: #999999;
      --subtle: #2a2a2a;
      --yellow: #FFB800;
      --blue: #4A90D9;
      --purple: #9B59B6;
      --green: #00E5A0;
      --orange: #FF6B35;
      --font-heading: 'Barlow Condensed', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--dark); color: var(--white); font-family: var(--font-body); }
    a { color: var(--teal); text-decoration: none; }

    /* ── Sidebar (shared pattern) ── */
    .admin-sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
      background: var(--dark2); border-right: 1px solid var(--subtle);
      overflow-y: auto; z-index: 50;
    }
    .sidebar-logo { padding: 24px 20px 8px; }
    .sidebar-logo img { height: 28px; }
    .sidebar-label {
      font-family: var(--font-heading); font-weight: 800; font-size: 11px;
      letter-spacing: 0.25em; color: var(--muted); padding: 0 20px 16px;
      text-transform: uppercase;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 8px; font-size: 13px; color: var(--muted);
      transition: all 0.15s; cursor: pointer; text-decoration: none;
    }
    .sidebar-link:hover { background: var(--dark3); color: var(--white); }
    .sidebar-link.active {
      background: rgba(0,229,204,0.08); color: var(--teal);
      border-left: 3px solid var(--teal);
    }
    .sidebar-link .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-section-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 12px 6px; font-family: var(--font-heading);
      font-weight: 700; font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); cursor: pointer;
    }
    .sidebar-chevron { font-size: 14px; }
    .sidebar-footer {
      padding: 16px 20px; border-top: 1px solid var(--subtle);
      position: absolute; bottom: 0; left: 0; right: 0;
    }
    .sidebar-footer button {
      background: none; border: 1px solid var(--subtle); color: var(--muted);
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
      width: 100%;
    }

    /* ── Main ── */
    .main { margin-left: 240px; padding: 32px 40px; min-height: 100vh; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .page-header h1 {
      font-family: var(--font-heading); font-weight: 800; font-size: 28px;
      text-transform: uppercase; letter-spacing: 0.02em;
    }
    .page-header h1 span { color: var(--teal); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 32px;
      border-bottom: 1px solid var(--subtle); padding-bottom: 0;
    }
    .tab {
      font-family: var(--font-heading); font-weight: 700; font-size: 14px;
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 10px 20px; cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent; transition: all 0.2s;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .tab:hover { color: var(--white); }
    .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Play Template Cards ── */
    .plays-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px; margin-bottom: 32px;
    }
    .play-card {
      background: var(--dark2); border: 1px solid var(--subtle); border-radius: 16px;
      padding: 28px; transition: border-color 0.3s, transform 0.2s; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .play-card:hover { border-color: var(--teal); transform: translateY(-2px); }
    .play-card-icon {
      font-size: 40px; margin-bottom: 12px;
    }
    .play-card h3 {
      font-family: var(--font-heading); font-weight: 800; font-size: 24px;
      text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.02em;
    }
    .play-card p {
      font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 16px;
    }
    .play-card-meta {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .play-meta-tag {
      font-size: 11px; font-family: var(--font-heading); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(0,229,204,0.1); color: var(--teal);
    }
    .play-meta-tag.chapter { background: rgba(155,89,182,0.1); color: var(--purple); }

    /* ── Active Runs ── */
    .runs-list { display: flex; flex-direction: column; gap: 12px; }
    .run-card {
      background: var(--dark2); border: 1px solid var(--subtle); border-radius: 12px;
      padding: 20px 24px; display: grid;
      grid-template-columns: 1fr auto; gap: 16px; align-items: center;
      transition: border-color 0.2s; cursor: pointer;
    }
    .run-card:hover { border-color: var(--teal); }
    .run-header { display: flex; align-items: center; gap: 12px; }
    .run-icon { font-size: 28px; }
    .run-info h3 {
      font-family: var(--font-heading); font-weight: 700; font-size: 16px;
      text-transform: uppercase;
    }
    .run-info .run-client { font-size: 13px; color: var(--muted); }
    .run-stats {
      display: flex; align-items: center; gap: 20px;
    }
    .run-stat {
      text-align: center;
    }
    .run-stat-value {
      font-family: var(--font-heading); font-weight: 800; font-size: 22px;
    }
    .run-stat-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted);
    }
    .run-progress {
      width: 120px; height: 6px; background: var(--dark3); border-radius: 3px;
      overflow: hidden;
    }
    .run-progress-fill {
      height: 100%; background: var(--teal); border-radius: 3px;
      transition: width 0.5s;
    }

    /* ── Status Badges ── */
    .badge {
      display: inline-block; font-family: var(--font-heading); font-weight: 600;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 3px 10px; border-radius: 4px;
    }
    .badge.active { background: rgba(0,229,160,0.15); color: var(--green); }
    .badge.paused { background: rgba(255,184,0,0.15); color: var(--yellow); }
    .badge.completed { background: rgba(0,229,204,0.15); color: var(--teal); }
    .badge.cancelled { background: rgba(153,153,153,0.15); color: var(--muted); }
    .badge.configuring { background: rgba(74,144,217,0.15); color: var(--blue); }

    /* ── Run Actions ── */
    .run-actions {
      display: flex; gap: 8px;
    }
    .btn {
      font-family: var(--font-heading); font-weight: 700; font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 8px 18px; border-radius: 8px; cursor: pointer; border: none;
      transition: all 0.2s;
    }
    .btn-teal { background: var(--teal); color: var(--dark); }
    .btn-teal:hover { background: #00ffde; }
    .btn-outline {
      background: none; border: 1px solid var(--subtle); color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--white); color: var(--white); }
    .btn-magenta { background: var(--magenta); color: var(--white); }
    .btn-small { font-size: 11px; padding: 5px 12px; }

    /* ── Launch Modal ── */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); z-index: 100; align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: var(--dark2); border: 1px solid var(--subtle); border-radius: 16px;
      padding: 36px; max-width: 700px; width: 95%; max-height: 85vh; overflow-y: auto;
    }
    .modal-card h2 {
      font-family: var(--font-heading); font-weight: 800; font-size: 24px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .modal-card h2 span { color: var(--teal); }
    .modal-subtitle {
      font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6;
    }

    /* ── Form Fields ── */
    .form-section {
      margin-bottom: 24px;
    }
    .form-section-title {
      font-family: var(--font-heading); font-weight: 700; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.15em; color: var(--teal);
      margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--subtle);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-group label .required { color: var(--magenta); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: var(--dark); border: 1px solid var(--subtle);
      border-radius: 8px; padding: 10px 14px; color: var(--white);
      font-family: var(--font-body); font-size: 14px; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--teal);
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group .hint {
      font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic;
    }
    .form-group .auto-filled {
      font-size: 11px; color: var(--teal); margin-top: 4px;
    }
    .form-actions {
      display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px;
      padding-top: 20px; border-top: 1px solid var(--subtle);
    }

    /* ── Run Detail View ── */
    .run-detail { display: none; }
    .run-detail.active { display: block; }
    .run-detail-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .run-detail-title {
      display: flex; align-items: center; gap: 16px;
    }
    .run-detail-title h2 {
      font-family: var(--font-heading); font-weight: 800; font-size: 28px;
      text-transform: uppercase;
    }
    .run-detail-title h2 .client { color: var(--teal); }
    .back-btn {
      font-size: 13px; color: var(--muted); cursor: pointer; background: none;
      border: none; font-family: var(--font-body);
    }
    .back-btn:hover { color: var(--white); }

    /* ── Steps Timeline ── */
    .steps-timeline { margin-top: 24px; }
    .step-row {
      display: grid; grid-template-columns: 50px 1fr 100px 120px;
      align-items: center; padding: 14px 16px; background: var(--dark2);
      border: 1px solid var(--subtle); border-radius: 10px; margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .step-row:hover { border-color: var(--teal); }
    .step-order {
      font-family: var(--font-heading); font-weight: 900; font-size: 20px;
      color: var(--muted); text-align: center;
    }
    .step-info h4 {
      font-family: var(--font-heading); font-weight: 700; font-size: 14px;
      text-transform: uppercase; margin-bottom: 2px;
    }
    .step-info p { font-size: 12px; color: var(--muted); }
    .step-type {
      font-family: var(--font-heading); font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .step-type.automated { color: var(--teal); }
    .step-type.recurring { color: var(--blue); }
    .step-type.approval { color: var(--yellow); }
    .step-type.human { color: var(--magenta); }

    .step-status {
      font-family: var(--font-heading); font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.05em; text-align: right;
    }
    .step-status.pending { color: var(--muted); }
    .step-status.queued { color: var(--blue); }
    .step-status.running { color: var(--yellow); }
    .step-status.awaiting_approval { color: var(--orange); }
    .step-status.awaiting_human { color: var(--magenta); }
    .step-status.completed { color: var(--green); }
    .step-status.failed { color: #EF4444; }

    /* ── Metrics Cards ── */
    .metrics-row {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px; margin: 24px 0;
    }
    .metric-card {
      background: var(--dark2); border: 1px solid var(--subtle); border-radius: 10px;
      padding: 16px; text-align: center;
    }
    .metric-card .value {
      font-family: var(--font-heading); font-weight: 900; font-size: 32px;
      color: var(--teal); line-height: 1;
    }
    .metric-card .label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-top: 6px;
    }

    /* ── Loading / Empty ── */
    .loading {
      text-align: center; padding: 60px 0; color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--subtle);
      border-top-color: var(--teal); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .main { margin-left: 0; padding: 20px; }
      .step-row { grid-template-columns: 40px 1fr; gap: 8px; }
      .step-type, .step-status { grid-column: 2; }
    }
  </style>
</head>
<body>

<aside class="admin-sidebar" id="sidebar"></aside>

<div class="main">
  <!-- Page Header -->
  <div class="page-header">
    <h1>&#9889; <span>Playbook</span></h1>
    <button class="btn btn-teal" id="launchBtn" onclick="showLaunchModal()">Launch a Play</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="plays" onclick="switchTab('plays')">Plays</button>
    <button class="tab" data-tab="active-runs" onclick="switchTab('active-runs')">Active Runs</button>
    <button class="tab" data-tab="history" onclick="switchTab('history')">History</button>
  </div>

  <!-- ═══ TAB: Plays (Templates) ═══ -->
  <div class="tab-panel active" id="panel-plays">
    <div class="loading" id="loadingTemplates">
      <div class="spinner"></div>
      <p>Loading playbook...</p>
    </div>
    <div class="plays-grid" id="playsGrid"></div>
    <div class="empty-state" id="emptyTemplates" style="display:none">
      <div class="icon">&#128214;</div>
      <p>No plays found. Create your first play template.</p>
    </div>
  </div>

  <!-- ═══ TAB: Active Runs ═══ -->
  <div class="tab-panel" id="panel-active-runs">
    <div class="loading" id="loadingRuns">
      <div class="spinner"></div>
      <p>Loading active runs...</p>
    </div>
    <div class="runs-list" id="runsList"></div>
    <div class="empty-state" id="emptyRuns" style="display:none">
      <div class="icon">&#128640;</div>
      <p>No active plays. Launch one to get started.</p>
    </div>
  </div>

  <!-- ═══ TAB: History ═══ -->
  <div class="tab-panel" id="panel-history">
    <div class="runs-list" id="historyList"></div>
    <div class="empty-state" id="emptyHistory" style="display:none">
      <div class="icon">&#128218;</div>
      <p>No completed plays yet.</p>
    </div>
  </div>

  <!-- ═══ Run Detail View (replaces tabs when viewing a run) ═══ -->
  <div class="run-detail" id="runDetail">
    <div class="run-detail-header">
      <div class="run-detail-title">
        <button class="back-btn" onclick="closeRunDetail()">&larr; Back to runs</button>
        <h2 id="runDetailTitle"></h2>
        <span class="badge" id="runDetailBadge"></span>
      </div>
      <div class="run-actions" id="runDetailActions"></div>
    </div>

    <!-- Metrics -->
    <div class="metrics-row" id="runMetrics"></div>

    <!-- Steps -->
    <h3 style="font-family:var(--font-heading);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:16px;">Steps</h3>
    <div class="steps-timeline" id="runSteps"></div>
  </div>
</div>

<!-- ═══ Launch Modal ═══ -->
<div class="modal-overlay" id="launchModal">
  <div class="modal-card">
    <h2>Launch <span id="launchPlayName"></span></h2>
    <p class="modal-subtitle" id="launchPlayDesc"></p>

    <!-- Step 1: Select play + client -->
    <div class="form-section" id="launchStep1">
      <div class="form-section-title">Select Play & Client</div>
      <div class="form-group">
        <label>Play <span class="required">*</span></label>
        <select id="launchPlaySelect" onchange="onPlaySelected()">
          <option value="">Choose a play...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Client / Business <span class="required">*</span></label>
        <select id="launchClientSelect">
          <option value="">Choose a client...</option>
        </select>
      </div>
    </div>

    <!-- Step 2: Inputs (dynamically generated) -->
    <div class="form-section" id="launchStep2" style="display:none">
      <div class="form-section-title">Play Inputs</div>
      <div id="launchInputs"></div>
    </div>

    <!-- Step 3: Review steps -->
    <div class="form-section" id="launchStep3" style="display:none">
      <div class="form-section-title">Steps That Will Execute</div>
      <div id="launchStepsPreview"></div>
    </div>

    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeLaunchModal()">Cancel</button>
      <button class="btn btn-teal" id="launchSubmitBtn" onclick="launchPlay()">Launch Play</button>
    </div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════
  let allTemplates = [];
  let allClients = [];
  let allRuns = [];
  let selectedTemplate = null;
  let currentRunDetail = null;

  const SUPABASE_URL = 'https://podyldvpvgqktwbqswrc.supabase.co';
  const SUPABASE_KEY = 'sb_secret_7G4kmywzGey6j3PyeT9wnw_Q1aN2dep';

  // ═══════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════
  async function init() {
    const ok = await NB_ADMIN.checkAuth();
    if (!ok) return;
    NB_ADMIN.renderSidebar('playbook');

    // Load templates, clients, and runs in parallel
    const [templateData, clientData, runsData] = await Promise.all([
      NB_ADMIN.apiFetch('playbook?action=templates'),
      NB_ADMIN.apiFetch('clients'),
      NB_ADMIN.apiFetch('playbook?action=runs'),
    ]);

    if (templateData) allTemplates = templateData.templates || [];
    if (clientData) allClients = clientData.clients || [];
    if (runsData) allRuns = runsData.runs || [];

    renderTemplates();
    renderRuns();
    populateLaunchDropdowns();
  }

  // ═══════════════════════════════════════════════════════════
  // TABS
  // ═══════════════════════════════════════════════════════════
  function switchTab(tabId) {
    // Hide run detail if open
    document.getElementById('runDetail').classList.remove('active');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    document.getElementById(`panel-${tabId}`).classList.add('active');

    if (tabId === 'active-runs') renderRuns();
    if (tabId === 'history') renderHistory();
  }

  // ═══════════════════════════════════════════════════════════
  // RENDER: Templates
  // ═══════════════════════════════════════════════════════════
  function renderTemplates() {
    document.getElementById('loadingTemplates').style.display = 'none';
    const grid = document.getElementById('playsGrid');

    if (!allTemplates.length) {
      document.getElementById('emptyTemplates').style.display = 'block';
      return;
    }

    grid.innerHTML = allTemplates.map(t => {
      const stepCount = (t.steps || []).length;
      const autoSteps = (t.steps || []).filter(s => s.type === 'automated' || s.type === 'recurring').length;
      const humanSteps = (t.steps || []).filter(s => s.type === 'human').length;
      const approvalSteps = (t.steps || []).filter(s => s.type === 'approval').length;
      const activeRuns = allRuns.filter(r => r.play_slug === t.slug && r.status === 'active').length;

      return `
        <div class="play-card" onclick="showLaunchModalForPlay('${t.slug}')">
          <div class="play-card-icon">${t.icon || '&#9889;'}</div>
          <h3>${NB_ADMIN.esc(t.name)}</h3>
          <p>${NB_ADMIN.esc(t.description)}</p>
          <div class="play-card-meta">
            <span class="play-meta-tag chapter">${NB_ADMIN.esc(t.chapter || 'zero-to-one')}</span>
            <span class="play-meta-tag">${stepCount} steps</span>
            <span class="play-meta-tag">${autoSteps} auto</span>
            ${approvalSteps ? `<span class="play-meta-tag" style="background:rgba(255,184,0,0.1);color:var(--yellow);">${approvalSteps} approval</span>` : ''}
            ${humanSteps ? `<span class="play-meta-tag" style="background:rgba(255,45,120,0.1);color:var(--magenta);">${humanSteps} human</span>` : ''}
            ${activeRuns ? `<span class="play-meta-tag" style="background:rgba(0,229,160,0.15);color:var(--green);">${activeRuns} running</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ═══════════════════════════════════════════════════════════
  // RENDER: Active Runs
  // ═══════════════════════════════════════════════════════════
  function renderRuns() {
    document.getElementById('loadingRuns').style.display = 'none';
    const list = document.getElementById('runsList');
    const activeRuns = allRuns.filter(r => r.status === 'active' || r.status === 'paused' || r.status === 'configuring');

    if (!activeRuns.length) {
      list.innerHTML = '';
      document.getElementById('emptyRuns').style.display = 'block';
      return;
    }
    document.getElementById('emptyRuns').style.display = 'none';

    list.innerHTML = activeRuns.map(r => {
      const template = allTemplates.find(t => t.slug === r.play_slug);
      const icon = template ? template.icon : '&#9889;';
      const pct = r.total_steps ? Math.round((r.completed_steps / r.total_steps) * 100) : 0;
      const dayLabel = r.current_day ? `Day ${r.current_day}` : 'Day 1';

      return `
        <div class="run-card" onclick="openRunDetail('${r.id}')">
          <div class="run-header">
            <div class="run-icon">${icon}</div>
            <div class="run-info">
              <h3>${NB_ADMIN.esc(r.play_slug.replace(/-/g, ' ').toUpperCase())}</h3>
              <span class="run-client">${NB_ADMIN.esc(r.client_name || r.client_id)} &middot; ${dayLabel} &middot; Started ${NB_ADMIN.timeAgo(r.started_at)}</span>
            </div>
          </div>
          <div class="run-stats">
            <div class="run-stat">
              <div class="run-stat-value">${r.completed_steps || 0}<span style="color:var(--muted);font-size:14px;">/${r.total_steps || 0}</span></div>
              <div class="run-stat-label">Steps</div>
            </div>
            <div>
              <div class="run-progress"><div class="run-progress-fill" style="width:${pct}%"></div></div>
              <div class="run-stat-label" style="margin-top:4px;text-align:center;">${pct}%</div>
            </div>
            <span class="badge ${r.status}">${r.status}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  // ═══════════════════════════════════════════════════════════
  // RENDER: History
  // ═══════════════════════════════════════════════════════════
  function renderHistory() {
    const list = document.getElementById('historyList');
    const historyRuns = allRuns.filter(r => r.status === 'completed' || r.status === 'cancelled');

    if (!historyRuns.length) {
      list.innerHTML = '';
      document.getElementById('emptyHistory').style.display = 'block';
      return;
    }
    document.getElementById('emptyHistory').style.display = 'none';

    list.innerHTML = historyRuns.map(r => {
      const template = allTemplates.find(t => t.slug === r.play_slug);
      const icon = template ? template.icon : '&#9889;';
      const duration = r.completed_at && r.started_at
        ? NB_ADMIN.formatDuration((new Date(r.completed_at) - new Date(r.started_at)) / 1000)
        : '—';

      return `
        <div class="run-card" onclick="openRunDetail('${r.id}')">
          <div class="run-header">
            <div class="run-icon">${icon}</div>
            <div class="run-info">
              <h3>${NB_ADMIN.esc(r.play_slug.replace(/-/g, ' ').toUpperCase())}</h3>
              <span class="run-client">${NB_ADMIN.esc(r.client_name || r.client_id)} &middot; Ran for ${duration}</span>
            </div>
          </div>
          <div class="run-stats">
            <div class="run-stat">
              <div class="run-stat-value">${r.completed_steps || 0}</div>
              <div class="run-stat-label">Completed</div>
            </div>
            <span class="badge ${r.status}">${r.status}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  // ═══════════════════════════════════════════════════════════
  // RUN DETAIL VIEW
  // ═══════════════════════════════════════════════════════════
  async function openRunDetail(runId) {
    // Hide tabs and panels, show detail
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.tabs').style.display = 'none';
    document.getElementById('runDetail').classList.add('active');

    const data = await NB_ADMIN.apiFetch(`playbook?action=run&id=${runId}`);
    if (!data) return;

    currentRunDetail = data;
    const run = data.run;
    const steps = data.steps || [];
    const metrics = data.metrics || [];

    // Title
    document.getElementById('runDetailTitle').innerHTML =
      `${NB_ADMIN.esc(run.play_slug.replace(/-/g, ' ').toUpperCase())} <span class="client">&times; ${NB_ADMIN.esc(run.client_name || run.client_id)}</span>`;

    // Badge
    const badge = document.getElementById('runDetailBadge');
    badge.textContent = run.status;
    badge.className = `badge ${run.status}`;

    // Actions
    const actions = document.getElementById('runDetailActions');
    let actionsHtml = '';
    if (run.status === 'active') {
      actionsHtml += `<button class="btn btn-outline btn-small" onclick="updateRunStatus('${run.id}','paused')">Pause</button>`;
      actionsHtml += `<button class="btn btn-outline btn-small" onclick="updateRunStatus('${run.id}','completed')">Complete</button>`;
    }
    if (run.status === 'paused') {
      actionsHtml += `<button class="btn btn-teal btn-small" onclick="updateRunStatus('${run.id}','active')">Resume</button>`;
      actionsHtml += `<button class="btn btn-outline btn-small" onclick="updateRunStatus('${run.id}','cancelled')">Cancel</button>`;
    }
    actions.innerHTML = actionsHtml;

    // Metrics
    const metricsRow = document.getElementById('runMetrics');
    const latestMetric = metrics[0]?.metrics || {};
    const metricKeys = Object.keys(latestMetric);
    if (metricKeys.length) {
      metricsRow.innerHTML = metricKeys.map(k => `
        <div class="metric-card">
          <div class="value">${latestMetric[k]}</div>
          <div class="label">${k.replace(/_/g, ' ')}</div>
        </div>
      `).join('');
    } else {
      metricsRow.innerHTML = `
        <div class="metric-card"><div class="value">Day ${run.current_day || 1}</div><div class="label">Current Day</div></div>
        <div class="metric-card"><div class="value">${run.completed_steps || 0}/${run.total_steps || 0}</div><div class="label">Steps</div></div>
        <div class="metric-card"><div class="value">${NB_ADMIN.timeAgo(run.started_at)}</div><div class="label">Started</div></div>
      `;
    }

    // Steps timeline
    const stepsEl = document.getElementById('runSteps');
    stepsEl.innerHTML = steps.map((s, i) => `
      <div class="step-row">
        <div class="step-order">${String(i + 1).padStart(2, '0')}</div>
        <div class="step-info">
          <h4>${NB_ADMIN.esc(s.name)}</h4>
          <p>${NB_ADMIN.esc(s.agent || 'Manual')}${s.schedule ? ' &middot; ' + NB_ADMIN.esc(s.schedule) : ''}</p>
        </div>
        <div class="step-type ${s.step_type}">${s.step_type}</div>
        <div class="step-status ${s.status}">${s.status.replace(/_/g, ' ')}</div>
      </div>
    `).join('');
  }

  function closeRunDetail() {
    document.getElementById('runDetail').classList.remove('active');
    document.querySelector('.tabs').style.display = 'flex';
    // Re-show the previously active tab
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) switchTab(activeTab.dataset.tab);
  }

  async function updateRunStatus(runId, status) {
    const labels = { paused: 'Pause', completed: 'Complete', active: 'Resume', cancelled: 'Cancel' };
    if (!confirm(`${labels[status] || status} this play run?`)) return;

    await NB_ADMIN.apiSend('playbook?action=run', 'PATCH', { id: runId, status });

    // Refresh
    const runsData = await NB_ADMIN.apiFetch('playbook?action=runs');
    if (runsData) allRuns = runsData.runs || [];
    openRunDetail(runId);
  }

  // ═══════════════════════════════════════════════════════════
  // LAUNCH MODAL
  // ═══════════════════════════════════════════════════════════
  function populateLaunchDropdowns() {
    const playSelect = document.getElementById('launchPlaySelect');
    const clientSelect = document.getElementById('launchClientSelect');

    allTemplates.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.slug;
      opt.textContent = `${t.icon} ${t.name}`;
      playSelect.appendChild(opt);
    });

    allClients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.client_id || c.id;
      opt.textContent = c.client_name || c.client_slug;
      opt.dataset.name = c.client_name || c.client_slug;
      clientSelect.appendChild(opt);
    });
  }

  function showLaunchModal() {
    document.getElementById('launchModal').classList.add('show');
  }

  function showLaunchModalForPlay(slug) {
    document.getElementById('launchPlaySelect').value = slug;
    onPlaySelected();
    showLaunchModal();
  }

  function closeLaunchModal() {
    document.getElementById('launchModal').classList.remove('show');
    selectedTemplate = null;
    document.getElementById('launchStep2').style.display = 'none';
    document.getElementById('launchStep3').style.display = 'none';
    document.getElementById('launchInputs').innerHTML = '';
    document.getElementById('launchStepsPreview').innerHTML = '';
  }

  function onPlaySelected() {
    const slug = document.getElementById('launchPlaySelect').value;
    selectedTemplate = allTemplates.find(t => t.slug === slug);

    if (!selectedTemplate) {
      document.getElementById('launchPlayName').textContent = '';
      document.getElementById('launchPlayDesc').textContent = '';
      document.getElementById('launchStep2').style.display = 'none';
      document.getElementById('launchStep3').style.display = 'none';
      return;
    }

    document.getElementById('launchPlayName').textContent = selectedTemplate.name;
    document.getElementById('launchPlayDesc').textContent = selectedTemplate.description;

    // Render input fields
    const inputSchema = selectedTemplate.input_schema || [];
    const inputsContainer = document.getElementById('launchInputs');
    inputsContainer.innerHTML = inputSchema.map(inp => {
      const isAutoFill = inp.source === 'brand_docs';
      return `
        <div class="form-group">
          <label>${NB_ADMIN.esc(inp.label)} ${inp.required ? '<span class="required">*</span>' : ''}</label>
          ${inp.type === 'textarea' || (inp.placeholder && inp.placeholder.length > 80)
            ? `<textarea id="input_${inp.key}" placeholder="${NB_ADMIN.esc(inp.placeholder || '')}" data-key="${inp.key}"></textarea>`
            : `<input type="text" id="input_${inp.key}" placeholder="${NB_ADMIN.esc(inp.placeholder || '')}" data-key="${inp.key}">`
          }
          ${isAutoFill ? '<div class="auto-filled">&#10003; Will attempt to auto-fill from brand docs</div>' : ''}
        </div>
      `;
    }).join('');
    document.getElementById('launchStep2').style.display = 'block';

    // Render steps preview
    const stepsPreview = document.getElementById('launchStepsPreview');
    stepsPreview.innerHTML = (selectedTemplate.steps || []).map((s, i) => {
      const typeColors = { automated: 'var(--teal)', recurring: 'var(--blue)', approval: 'var(--yellow)', human: 'var(--magenta)' };
      const color = typeColors[s.type] || 'var(--muted)';
      return `
        <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--subtle);">
          <span style="font-family:var(--font-heading);font-weight:900;font-size:16px;color:var(--muted);width:30px;">${String(i+1).padStart(2,'0')}</span>
          <span style="flex:1;font-size:13px;">${NB_ADMIN.esc(s.name)}</span>
          <span style="font-family:var(--font-heading);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:${color};">${s.type}</span>
          <span style="font-size:11px;color:var(--muted);">${s.agent || 'manual'}</span>
        </div>
      `;
    }).join('');
    document.getElementById('launchStep3').style.display = 'block';
  }

  async function launchPlay() {
    if (!selectedTemplate) return alert('Select a play first.');
    const clientSelect = document.getElementById('launchClientSelect');
    const clientId = clientSelect.value;
    if (!clientId) return alert('Select a client.');

    const clientName = clientSelect.options[clientSelect.selectedIndex].dataset.name || clientId;

    // Gather inputs
    const inputs = {};
    const inputSchema = selectedTemplate.input_schema || [];
    for (const inp of inputSchema) {
      const el = document.getElementById(`input_${inp.key}`);
      if (el) inputs[inp.key] = el.value.trim();
      if (inp.required && !inputs[inp.key]) {
        return alert(`"${inp.label}" is required.`);
      }
    }

    // Confirm
    if (!confirm(`Launch ${selectedTemplate.name} for ${clientName}?\n\nThis will activate ${selectedTemplate.steps.length} steps.`)) return;

    document.getElementById('launchSubmitBtn').textContent = 'Launching...';
    document.getElementById('launchSubmitBtn').disabled = true;

    const result = await NB_ADMIN.apiSend('playbook?action=launch', 'POST', {
      play_slug: selectedTemplate.slug,
      client_id: clientId,
      client_name: clientName,
      inputs,
    });

    document.getElementById('launchSubmitBtn').textContent = 'Launch Play';
    document.getElementById('launchSubmitBtn').disabled = false;

    if (result && result.run) {
      closeLaunchModal();
      // Refresh runs
      const runsData = await NB_ADMIN.apiFetch('playbook?action=runs');
      if (runsData) allRuns = runsData.runs || [];
      renderRuns();
      renderTemplates();
      switchTab('active-runs');
      // Open the new run detail
      setTimeout(() => openRunDetail(result.run.id), 500);
    } else {
      alert('Failed to launch play. Check console.');
    }
  }

  // ═══════════════════════════════════════════════════════════
  // BOOT
  // ═══════════════════════════════════════════════════════════
  init();
</script>
</body>
</html>
