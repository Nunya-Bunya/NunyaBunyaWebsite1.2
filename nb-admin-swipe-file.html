<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe File | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
<style>
/* Clean swipe file — just the ads */
.swipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.swipe-card {
  background: var(--dark2); border: 1px solid var(--subtle); border-radius: 12px;
  overflow: hidden; position: relative; cursor: pointer; transition: border-color 0.2s;
}
.swipe-card:hover { border-color: rgba(0,229,204,0.3); }

/* Media — never crop */
.swipe-card img, .swipe-card video {
  width: 100%; height: auto; display: block;
}

/* Caption (if they typed a message with the screenshot) */
.swipe-card .caption {
  padding: 10px 14px; font-size: 13px; color: rgba(255,255,255,0.6);
  font-weight: 300; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* Delete X on hover */
.sc-delete {
  position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.6); border: none; color: var(--muted); font-size: 16px;
  cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5;
}
.swipe-card:hover .sc-delete { display: flex; }
.sc-delete:hover { background: rgba(255,68,68,0.3); color: #ff4444; }

/* File card — looks like a document page */
.sc-file {
  width: 100%; aspect-ratio: 3/4; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  background: #f5f5f5; position: relative; overflow: hidden;
}
.sc-file::before {
  content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0;
  border-style: solid; border-width: 0 40px 40px 0; border-color: transparent var(--dark2) transparent transparent;
}
.sc-file-icon { font-size: 56px; filter: grayscale(0.3); }
.sc-file-name { font-size: 14px; color: #333; word-break: break-word; font-weight: 600; padding: 0 20px; text-align: center; line-height: 1.4; }
.sc-file-type {
  font-size: 12px; color: #fff; background: #e74c3c; padding: 3px 12px;
  border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
}

/* Video badge */
.sc-video-badge {
  position: absolute; top: 8px; left: 8px; padding: 3px 10px; border-radius: 6px;
  background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; font-weight: 600;
  pointer-events: none;
}

/* Fullscreen view */
.view-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 150; align-items: center; justify-content: center; cursor: pointer;
  backdrop-filter: blur(4px);
}
.view-overlay.open { display: flex; }
.view-content {
  max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; cursor: default;
}
.view-content img, .view-content video {
  width: 100%; height: auto; border-radius: 8px;
}
.view-caption {
  margin-top: 12px; font-size: 14px; color: rgba(255,255,255,0.8);
  font-weight: 300; line-height: 1.6; white-space: pre-wrap;
}

/* Toolbar */
.swipe-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
.swipe-toolbar input {
  flex: 1; max-width: 400px; padding: 10px 16px; background: var(--dark2);
  border: 1px solid var(--subtle); color: var(--white); border-radius: 8px;
  font-size: 14px; font-family: var(--font-body);
}
.swipe-toolbar input:focus { outline: none; border-color: var(--teal); }
.swipe-toolbar input::placeholder { color: #555; }
.swipe-count { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1>Swipe <span>File</span></h1>
        <div class="date">Screenshot ads on your phone → paste in #swipe-file on Slack → they appear here.</div>
      </div>
    </div>

    <div class="swipe-toolbar">
      <input type="text" id="searchInput" placeholder="Search..." oninput="render()">
      <span class="swipe-count" id="count"></span>
    </div>

    <div class="swipe-grid" id="grid"></div>

    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon" style="font-size:48px;margin-bottom:16px">&#128247;</div>
      <p style="max-width:400px;margin:0 auto">Open Slack on your phone. Screenshot an ad you like. Paste it in <strong>#swipe-file</strong>. It shows up here.</p>
    </div>
  </main>
</div>

<!-- Fullscreen view -->
<div class="view-overlay" id="viewOverlay" onclick="closeView(event)">
  <div class="view-content" onclick="event.stopPropagation()">
    <img id="viewImg" src="" style="display:none">
    <video id="viewVideo" controls playsinline style="display:none"></video>
    <div class="view-caption" id="viewCaption"></div>
  </div>
</div>

<script src="/nb-admin-shared.js"></script>
<script>
let entries = [];

async function load() {
  const data = await NB_ADMIN.apiFetch('swipe');
  if (data) entries = data;
}

function render() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  let filtered = entries;
  if (q) {
    filtered = filtered.filter(e =>
      (e.copy || '').toLowerCase().includes(q) ||
      (e.title || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('count').textContent = `${filtered.length} ads`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(e => {
    const src = e.screenshot_url || '';
    const isVideo = e.media_type === 'video' || src.match(/\.(mp4|mov|webm)$/i);
    const isImage = src.match(/\.(jpg|jpeg|png|gif|webp)$/i);
    const isPdf = src.match(/\.pdf$/i);
    const caption = e.copy || e.title || '';
    const fileName = src.split('/').pop() || 'file';

    let mediaHtml = '';
    if (isVideo) {
      mediaHtml = `<span class="sc-video-badge">VIDEO</span><video src="${esc(src)}" muted playsinline preload="metadata"></video>`;
    } else if (isImage) {
      mediaHtml = `<img src="${esc(src)}" alt="">`;
    } else if (isPdf) {
      mediaHtml = `<div class="sc-file"><div class="sc-file-icon">&#128196;</div><div class="sc-file-name">${esc(caption || fileName)}</div><div class="sc-file-type">PDF</div></div>`;
    } else if (src) {
      mediaHtml = `<div class="sc-file"><div class="sc-file-icon">&#128196;</div><div class="sc-file-name">${esc(fileName)}</div></div>`;
    }

    return `
      <div class="swipe-card" onclick="viewEntry('${e.id}')">
        <button class="sc-delete" onclick="event.stopPropagation();deleteEntry('${e.id}')" title="Delete">&#10005;</button>
        ${mediaHtml}
        ${caption ? `<div class="caption">${esc(caption)}</div>` : ''}
      </div>
    `;
  }).join('');
}

function viewEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;

  const src = e.screenshot_url || '';
  const isVideo = e.media_type === 'video' || src.match(/\.(mp4|mov|webm)$/i);
  const img = document.getElementById('viewImg');
  const vid = document.getElementById('viewVideo');

  img.style.display = 'none';
  vid.style.display = 'none';
  vid.pause();

  const isPdf = src.match(/\.pdf$/i);
  const isFile = src && !src.match(/\.(jpg|jpeg|png|gif|webp)$/i) && !isVideo;

  if (isPdf && src) {
    window.open(src, '_blank');
    return;
  } else if (isFile && src) {
    window.open(src, '_blank');
    return;
  } else if (isVideo && src) {
    vid.src = src;
    vid.style.display = 'block';
  } else if (src) {
    img.src = src;
    img.style.display = 'block';
  }

  document.getElementById('viewCaption').textContent = e.copy || e.title || '';
  document.getElementById('viewOverlay').classList.add('open');
}

function closeView(e) {
  if (e.target === e.currentTarget) {
    document.getElementById('viewOverlay').classList.remove('open');
    document.getElementById('viewVideo').pause();
  }
}

async function deleteEntry(id) {
  if (!confirm('Delete?')) return;
  await NB_ADMIN.apiSend(`swipe?id=${id}`, 'DELETE', {});
  entries = entries.filter(e => e.id !== id);
  render();
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function init() {
  const ok = await NB_ADMIN.checkAuth();
  if (!ok) return;
  NB_ADMIN.renderSidebar('swipe-file');
  await load();
  render();
}
init();
</script>
</body>
</html>
