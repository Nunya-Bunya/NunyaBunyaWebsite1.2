<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Nunya Bunya — Landscape Ad</title>
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  .wrapper {
    width: 1200px;
    height: 628px;
    position: relative;
    overflow: hidden;
    background: #1A2E3E;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: row;
  }

  /* Teal gradient accent on left */
  .left-gradient {
    position: absolute;
    top: 0;
    left: 0;
    width: 350px;
    height: 100%;
    background: linear-gradient(135deg, rgba(75, 191, 180, 0.15) 0%, transparent 100%);
  }

  /* Top pink line */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #4BBFB4, #D6396B);
  }

  /* Left content */
  .left-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 50px 60px 70px;
    position: relative;
    z-index: 2;
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 4px;
    color: #4BBFB4;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1.15;
    color: #ffffff;
    margin: 0 0 24px 0;
  }

  .subheadline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.5;
  }

  /* Right side */
  .right-side {
    width: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 50px 60px 20px;
    position: relative;
    z-index: 2;
  }

  .offer-card {
    background: linear-gradient(145deg, #4BBFB4, #3da89e);
    border-radius: 20px;
    padding: 45px 40px;
    text-align: center;
    width: 260px;
    box-shadow: 0 20px 60px rgba(75, 191, 180, 0.3);
  }

  .offer-big {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 56px;
    color: #1A2E3E;
    line-height: 1;
    margin-bottom: 8px;
  }

  .offer-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: #1A2E3E;
    margin-bottom: 20px;
  }

  .offer-divider {
    width: 50px;
    height: 3px;
    background: rgba(26, 46, 62, 0.3);
    margin: 0 auto 20px auto;
    border-radius: 2px;
  }

  .offer-limited {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: rgba(26, 46, 62, 0.7);
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 52px;
    background: rgba(0, 0, 0, 0.25);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 70px;
    box-sizing: border-box;
    z-index: 3;
  }

  .bottom-url {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 1px;
  }

  .bottom-cta {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #4BBFB4;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="left-gradient"></div>
  <div class="top-line"></div>

  <div class="left-side">
    <div class="brand-name">Nunya Bunya</div>
    <h1 class="headline">Stop Guessing.<br>Start Growing.</h1>
    <p class="subheadline">AI-powered marketing that delivers results</p>
  </div>

  <div class="right-side">
    <div class="offer-card">
      <div class="offer-big">20% OFF</div>
      <div class="offer-sub">Your First Month</div>
      <div class="offer-divider"></div>
      <div class="offer-limited">March Only</div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="bottom-url">nunyabunya.com</span>
    <span class="bottom-cta">Book Your Free Audit &rarr;</span>
  </div>
</div>
</body>
</html>
