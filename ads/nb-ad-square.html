<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Nunya Bunya — Square Ad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  .wrapper {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #1A2E3E;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Decorative background elements */
  .bg-circle-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(75, 191, 180, 0.08) 0%, transparent 70%);
    top: -150px;
    right: -200px;
  }
  .bg-circle-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(214, 57, 107, 0.06) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
  }

  /* Pink accent bar */
  .pink-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #D6396B, #4BBFB4);
  }

  /* Content container */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 6px;
    color: #4BBFB4;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1.15;
    color: #ffffff;
    margin: 0 0 30px 0;
  }

  .subheadline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 60px;
    line-height: 1.5;
  }

  /* Pink accent element */
  .pink-accent {
    width: 80px;
    height: 4px;
    background: #D6396B;
    border-radius: 2px;
    margin-bottom: 50px;
  }

  /* Teal badge */
  .badge {
    background: rgba(75, 191, 180, 0.15);
    border: 2px solid #4BBFB4;
    border-radius: 50px;
    padding: 18px 44px;
    margin-bottom: 50px;
  }
  .badge-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #4BBFB4;
    letter-spacing: 1px;
  }

  .url {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="pink-bar"></div>

  <div class="content">
    <div class="brand-name">Nunya Bunya</div>
    <h1 class="headline">Stop Guessing.<br>Start Growing.</h1>
    <p class="subheadline">Done-for-you marketing powered by AI</p>
    <div class="pink-accent"></div>
    <div class="badge">
      <span class="badge-text">20% Off Your First Month — March Only</span>
    </div>
    <div class="url">nunyabunya.com</div>
  </div>
</div>
</body>
</html>
