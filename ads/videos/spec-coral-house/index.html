<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1080px; overflow: hidden; background: #0a0a0a; }
        #root { position: relative; width: 1080px; height: 1080px; overflow: hidden; }
        .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; }
        .bg { position: absolute; top: -60px; left: -60px; width: 1200px; height: 1200px; object-fit: cover; z-index: 1; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.3) 100%); z-index: 2; }
        .top-text { position: absolute; top: 80px; left: 0; right: 0; z-index: 10; text-align: center; }
        .escape { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 48px; color: rgba(255,255,255,0.85); letter-spacing: 4px; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }
        .brand-big { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 88px; color: #FFFFFF; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 4px 30px rgba(0,0,0,0.5); line-height: 1; }
        .gold-bar { width: 80px; height: 2px; background: #D4AF37; margin: 16px auto; }
    </style>
</head>
<body>
    <div id="root" data-composition-id="coral-house" data-start="0" data-duration="6" data-width="1080" data-height="1080">
        <div id="s1" class="clip scene" data-start="0" data-duration="6" data-track-index="1">
            <img class="bg" id="bg" src="bg.jpg" alt="">
            <div class="overlay" id="ov"></div>
            <div class="top-text">
                <div class="escape" id="t1">Your Weekend Escape</div>
                <div class="gold-bar" id="gb"></div>
                <div class="brand-big" id="t2">THE CORAL</div>
                <div class="brand-big" id="t3">HOUSE</div>
            </div>
        </div>
    </div>
    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from("#bg", { scale: 1.1, x: -30, duration: 6, ease: "power1.out" }, 0);
        tl.from("#ov", { opacity: 0, duration: 0.8 }, 0);
        tl.from("#t1", { y: -40, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.4);
        tl.from("#gb", { scaleX: 0, duration: 0.5, ease: "power3.out" }, 0.9);
        tl.from("#t2", { y: 40, opacity: 0, duration: 0.6, ease: "power3.out" }, 1.2);
        tl.from("#t3", { y: 40, opacity: 0, duration: 0.6, ease: "power3.out" }, 1.5);
        window.__timelines["coral-house"] = tl;
    </script>
</body>
</html>
