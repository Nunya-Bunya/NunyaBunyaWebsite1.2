<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; overflow: hidden; background: #FAF8F5; font-family: 'Lora', serif; }
        #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; }
        .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px; }
        .headline { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 92px; line-height: 1.05; color: #2D2D2D; position: relative; z-index: 10; }
        .subtext { font-family: 'Lora', serif; font-weight: 400; font-size: 42px; line-height: 1.4; color: #5B7C5E; margin-top: 30px; position: relative; z-index: 10; }
        .accent { color: #5B7C5E; }
        .gold { color: #C4A77D; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: 1; }
        .leaf-line { position: absolute; width: 2px; background: linear-gradient(180deg, transparent, #5B7C5E, transparent); z-index: 2; }
        .leaf-h { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, rgba(91,124,94,0.2), transparent); z-index: 2; }
        .dot { position: absolute; width: 8px; height: 8px; background: #C4A77D; border-radius: 50%; z-index: 3; }
        .stat-big { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 240px; color: #5B7C5E; position: relative; z-index: 10; line-height: 1; }
        .pill { font-family: 'Lora', serif; font-weight: 600; font-size: 36px; color: #5B7C5E; border: 2px solid rgba(91,124,94,0.3); padding: 16px 36px; border-radius: 100px; display: inline-block; margin: 10px; position: relative; z-index: 10; }
        .cta-button { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 46px; color: #FAF8F5; background: #5B7C5E; padding: 40px 72px; border-radius: 16px; position: relative; z-index: 10; }
        .cta-glow { position: absolute; width: 500px; height: 250px; background: rgba(91,124,94,0.2); border-radius: 100px; filter: blur(80px); z-index: 1; }
        .cta-url { font-family: 'Lora', serif; font-weight: 600; font-size: 34px; color: #C4A77D; margin-top: 40px; position: relative; z-index: 10; }
        .divider { width: 120px; height: 3px; background: #C4A77D; position: relative; z-index: 10; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="root" data-composition-id="zinia-ad" data-start="0" data-duration="14" data-width="1080" data-height="1920">

        <!-- SCENE 1: Pain point — 0s to 3.5s -->
        <div id="s1" class="clip scene" data-start="0" data-duration="3.5" data-track-index="1"
             style="background: linear-gradient(180deg, #FAF8F5 0%, #F0EDE8 100%);">
            <div class="orb" id="s1-orb1" style="width: 500px; height: 500px; top: 300px; left: -100px; background: rgba(91,124,94,0.1);"></div>
            <div class="orb" id="s1-orb2" style="width: 400px; height: 400px; bottom: 200px; right: -80px; background: rgba(196,167,125,0.12);"></div>
            <div class="leaf-line" id="s1-l1" style="height: 1920px; left: 200px;"></div>
            <div class="leaf-line" id="s1-l2" style="height: 1920px; right: 200px;"></div>
            <div class="leaf-h" id="s1-lh" style="width: 1080px; top: 960px;"></div>
            <div class="dot" id="s1-d1" style="top: 956px; left: 196px;"></div>
            <div class="dot" id="s1-d2" style="top: 956px; right: 196px;"></div>
            <div class="headline" id="s1-h1">Your body</div>
            <div class="headline" id="s1-h2">carries</div>
            <div class="headline accent" id="s1-h3" style="font-size: 110px;">everything.</div>
            <div class="divider" id="s1-div"></div>
            <div class="subtext" id="s1-sub">Stress. Tension. Pain.</div>
        </div>

        <!-- SCENE 2: The fix — 3.5s to 7s -->
        <div id="s2" class="clip scene" data-start="3.5" data-duration="3.5" data-track-index="2"
             style="background: linear-gradient(180deg, #F0EDE8 0%, #FAF8F5 100%);">
            <div class="orb" id="s2-orb" style="width: 600px; height: 600px; top: 500px; left: 200px; background: rgba(91,124,94,0.12);"></div>
            <div class="leaf-line" style="height: 1920px; left: 540px;"></div>
            <div class="headline" id="s2-h1">Remedial.</div>
            <div class="headline" id="s2-h2">Deep tissue.</div>
            <div class="headline gold" id="s2-h3">Chinese massage.</div>
            <div class="divider" id="s2-div"></div>
            <div class="subtext" id="s2-sub">Professional hands that know<br>where you hold your stress</div>
        </div>

        <!-- SCENE 3: Services — 7s to 10.5s -->
        <div id="s3" class="clip scene" data-start="7" data-duration="3.5" data-track-index="3"
             style="background: #FAF8F5;">
            <div class="orb" id="s3-orb" style="width: 500px; height: 500px; top: 600px; right: -100px; background: rgba(196,167,125,0.15);"></div>
            <div class="headline" id="s3-h1" style="margin-bottom: 50px;">Brisbane <span class="accent">CBD</span></div>
            <div class="pill" id="s3-p1">60 min from $80</div>
            <div class="pill" id="s3-p2">90 min from $110</div>
            <div class="pill" id="s3-p3">Hotel & Mobile</div>
        </div>

        <!-- SCENE 4: CTA — 10.5s to 14s -->
        <div id="s4" class="clip scene" data-start="10.5" data-duration="3.5" data-track-index="4"
             style="background: linear-gradient(180deg, #FAF8F5 0%, #F0EDE8 100%);">
            <div class="cta-glow" id="s4-glow" style="top: 800px; left: 290px;"></div>
            <div class="orb" id="s4-orb" style="width: 400px; height: 400px; top: 400px; right: -100px; background: rgba(91,124,94,0.1);"></div>
            <div class="headline" id="s4-h1" style="margin-bottom: 20px;">Book your</div>
            <div class="headline accent" id="s4-h2" style="font-size: 100px; margin-bottom: 50px;">relief.</div>
            <div class="cta-button" id="s4-btn">Book Now</div>
            <div class="cta-url" id="s4-url">brisbaneziniamassage.com</div>
        </div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // S1: Pain point
        tl.from("#s1-orb1", { x: -200, opacity: 0, duration: 1.5, ease: "power1.out" }, 0);
        tl.from("#s1-orb2", { x: 200, opacity: 0, duration: 1.5, ease: "power1.out" }, 0.2);
        tl.from("#s1-l1", { scaleY: 0, duration: 1, ease: "power3.out" }, 0);
        tl.from("#s1-l2", { scaleY: 0, duration: 1, ease: "power3.out" }, 0.1);
        tl.from("#s1-lh", { scaleX: 0, duration: 0.8, ease: "power3.out" }, 0.3);
        tl.from("#s1-d1", { scale: 0, duration: 0.3, ease: "back.out(2)" }, 0.8);
        tl.from("#s1-d2", { scale: 0, duration: 0.3, ease: "back.out(2)" }, 0.9);
        tl.from("#s1-h1", { y: 60, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.3);
        tl.from("#s1-h2", { y: 60, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.5);
        tl.from("#s1-h3", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.7);
        tl.from("#s1-div", { scaleX: 0, duration: 0.5, ease: "power3.out" }, 1.0);
        tl.from("#s1-sub", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.3);

        // S2: The fix
        tl.from("#s2-orb", { scale: 0.3, opacity: 0, duration: 1.5, ease: "power2.out" }, 3.5);
        tl.from("#s2-h1", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 3.7);
        tl.from("#s2-h2", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 4.0);
        tl.from("#s2-h3", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 4.3);
        tl.from("#s2-div", { scaleX: 0, duration: 0.5, ease: "power3.out" }, 4.6);
        tl.from("#s2-sub", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 4.9);

        // S3: Services
        tl.from("#s3-orb", { x: 200, opacity: 0, duration: 1.5, ease: "power1.out" }, 7);
        tl.from("#s3-h1", { y: 40, opacity: 0, duration: 0.5, ease: "power3.out" }, 7.2);
        tl.from("#s3-p1", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 7.6);
        tl.from("#s3-p2", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 7.9);
        tl.from("#s3-p3", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 8.2);

        // S4: CTA
        tl.from("#s4-glow", { opacity: 0, scale: 0.5, duration: 1, ease: "power2.out" }, 10.5);
        tl.from("#s4-orb", { x: 100, opacity: 0, duration: 1.5, ease: "power1.out" }, 10.5);
        tl.from("#s4-h1", { y: 40, opacity: 0, duration: 0.5, ease: "power3.out" }, 10.7);
        tl.from("#s4-h2", { scale: 0.5, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 11.0);
        tl.from("#s4-btn", { scale: 0.5, opacity: 0, duration: 0.6, ease: "back.out(1.7)" }, 11.5);
        tl.from("#s4-url", { y: 30, opacity: 0, duration: 0.4, ease: "power2.out" }, 12.0);
        tl.to("#s4-btn", { scale: 1.05, duration: 0.5, repeat: 3, yoyo: true, ease: "power1.inOut" }, 12.5);

        window.__timelines["zinia-ad"] = tl;
    </script>
</body>
</html>
