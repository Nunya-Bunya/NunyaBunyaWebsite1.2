<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0a0a0a; font-family: 'Nunito', sans-serif; }
        #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; }
        .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px; }
        .scene-bg { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; object-fit: cover; z-index: 1; }
        .scene-overlay { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; z-index: 2; }
        .headline { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 96px; line-height: 1.1; color: #FFFFFF; position: relative; z-index: 10; text-shadow: 0 4px 30px rgba(0,0,0,0.6); }
        .subtext { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 42px; line-height: 1.4; color: rgba(255,255,255,0.9); margin-top: 30px; position: relative; z-index: 10; text-shadow: 0 2px 20px rgba(0,0,0,0.7); }
        .green { color: #2E6B4F; }
        .orange { color: #F4A742; }
        .pill { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 36px; color: #FDF8F0; background: rgba(46,107,79,0.85); padding: 18px 40px; border-radius: 100px; display: inline-block; margin: 10px; position: relative; z-index: 10; backdrop-filter: blur(8px); }
        .cta-button { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 48px; color: #FDF8F0; background: #2E6B4F; padding: 40px 72px; border-radius: 100px; position: relative; z-index: 10; box-shadow: 0 8px 40px rgba(46,107,79,0.5); }
        .cta-url { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 34px; color: #F4A742; margin-top: 40px; position: relative; z-index: 10; text-shadow: 0 2px 20px rgba(0,0,0,0.7); }
        .logo-bar { position: absolute; bottom: 80px; left: 0; right: 0; text-align: center; z-index: 10; font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 32px; color: rgba(255,255,255,0.6); letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 2px 15px rgba(0,0,0,0.6); }
    </style>
</head>
<body>
    <div id="root" data-composition-id="pawesome-ad" data-start="0" data-duration="14" data-width="1080" data-height="1920">

        <!-- SCENE 1: Hero with dog walker photo — 0s to 3.5s -->
        <div id="s1" class="clip scene" data-start="0" data-duration="3.5" data-track-index="1">
            <img class="scene-bg" id="s1-bg" src="hero.jpg" alt="">
            <div class="scene-overlay" id="s1-ov" style="background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.6) 100%);"></div>
            <div class="headline" id="s1-h1" style="margin-top: 200px;">Your dog</div>
            <div class="headline" id="s1-h2">deserves the</div>
            <div class="headline" id="s1-h3" style="color: #F4A742; font-size: 110px;">best walk.</div>
            <div class="logo-bar" id="s1-logo">Pawesome Dog Walkers</div>
        </div>

        <!-- SCENE 2: Dogs playing — 3.5s to 7s -->
        <div id="s2" class="clip scene" data-start="3.5" data-duration="3.5" data-track-index="2">
            <img class="scene-bg" id="s2-bg" src="lifestyle-1.jpg" alt="">
            <div class="scene-overlay" id="s2-ov" style="background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.5) 100%);"></div>
            <div class="headline" id="s2-h1" style="color: #FFFFFF;">Daily walks.</div>
            <div class="headline" id="s2-h2" style="color: #FFFFFF;">Adventure hikes.</div>
            <div class="headline" id="s2-h3" style="color: #F4A742;">Puppy visits.</div>
            <div class="subtext" id="s2-sub">Brisbane Northside's most<br>trusted dog walking service</div>
        </div>

        <!-- SCENE 3: Trust — 7s to 10.5s -->
        <div id="s3" class="clip scene" data-start="7" data-duration="3.5" data-track-index="3">
            <img class="scene-bg" id="s3-bg" src="park-walk.png" alt="">
            <div class="scene-overlay" id="s3-ov" style="background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.6) 100%);"></div>
            <div class="headline" id="s3-h1" style="font-size: 80px; margin-bottom: 50px; color: #FFFFFF;">What you get</div>
            <div class="pill" id="s3-p1">GPS-tracked walks</div>
            <div class="pill" id="s3-p2">Photo updates</div>
            <div class="pill" id="s3-p3">Insured & reliable</div>
            <div class="pill" id="s3-p4">First walk free</div>
        </div>

        <!-- SCENE 4: CTA — 10.5s to 14s -->
        <div id="s4" class="clip scene" data-start="10.5" data-duration="3.5" data-track-index="4">
            <img class="scene-bg" id="s4-bg" src="lifestyle-2.jpg" alt="">
            <div class="scene-overlay" id="s4-ov" style="background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.5) 100%);"></div>
            <div class="headline" id="s4-h1" style="margin-bottom: 20px;">Book a</div>
            <div class="headline" id="s4-h2" style="color: #2E6B4F; font-size: 110px; margin-bottom: 50px; text-shadow: 0 4px 30px rgba(0,0,0,0.8);">free walk.</div>
            <div class="cta-button" id="s4-btn">Book Now</div>
            <div class="cta-url" id="s4-url">pawesomewalkers.com.au</div>
        </div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // S1 — hero with photo
        tl.from("#s1-bg", { scale: 1.15, duration: 3.5, ease: "power1.out" }, 0);
        tl.from("#s1-ov", { opacity: 0, duration: 0.5, ease: "power1.out" }, 0);
        tl.from("#s1-h1", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.3);
        tl.from("#s1-h2", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.5);
        tl.from("#s1-h3", { scale: 0.5, opacity: 0, duration: 0.7, ease: "back.out(1.4)" }, 0.8);
        tl.from("#s1-logo", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.2);

        // S2 — dogs playing
        tl.from("#s2-bg", { scale: 1.15, duration: 3.5, ease: "power1.out" }, 3.5);
        tl.from("#s2-h1", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 3.8);
        tl.from("#s2-h2", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 4.1);
        tl.from("#s2-h3", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 4.4);
        tl.from("#s2-sub", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 4.8);

        // S3 — trust pills over park walk
        tl.from("#s3-bg", { scale: 1.1, duration: 3.5, ease: "power1.out" }, 7);
        tl.from("#s3-h1", { y: 40, opacity: 0, duration: 0.5, ease: "power3.out" }, 7.3);
        tl.from("#s3-p1", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 7.7);
        tl.from("#s3-p2", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 8.0);
        tl.from("#s3-p3", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 8.3);
        tl.from("#s3-p4", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 8.6);

        // S4 — CTA over owner photo
        tl.from("#s4-bg", { scale: 1.1, duration: 3.5, ease: "power1.out" }, 10.5);
        tl.from("#s4-h1", { y: 40, opacity: 0, duration: 0.5, ease: "power3.out" }, 10.7);
        tl.from("#s4-h2", { scale: 0.5, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 11.0);
        tl.from("#s4-btn", { scale: 0.5, opacity: 0, duration: 0.6, ease: "back.out(1.7)" }, 11.5);
        tl.from("#s4-url", { y: 30, opacity: 0, duration: 0.4, ease: "power2.out" }, 12.0);
        tl.to("#s4-btn", { scale: 1.05, duration: 0.5, repeat: 3, yoyo: true, ease: "power1.inOut" }, 12.5);

        window.__timelines["pawesome-ad"] = tl;
    </script>
</body>
</html>
