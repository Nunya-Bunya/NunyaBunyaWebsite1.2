<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; overflow: hidden; background: #FDF8F0; font-family: 'Nunito', sans-serif; }
        #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; }
        .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px; }
        .headline { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 96px; line-height: 1.1; color: #1A1A1A; position: relative; z-index: 10; }
        .subtext { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 42px; line-height: 1.4; color: #2E6B4F; margin-top: 30px; position: relative; z-index: 10; }
        .green { color: #2E6B4F; }
        .orange { color: #F4A742; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: 1; }
        .paw { position: absolute; font-size: 60px; z-index: 2; opacity: 0.08; }
        .wave-line { position: absolute; height: 4px; border-radius: 2px; background: rgba(46,107,79,0.15); z-index: 2; }
        .dot-trail { position: absolute; width: 12px; height: 12px; background: #F4A742; border-radius: 50%; z-index: 3; }
        .stat-big { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 260px; color: #2E6B4F; position: relative; z-index: 10; line-height: 1; }
        .pill { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 36px; color: #2E6B4F; border: 3px solid rgba(46,107,79,0.25); padding: 18px 40px; border-radius: 100px; display: inline-block; margin: 10px; position: relative; z-index: 10; background: rgba(46,107,79,0.04); }
        .cta-button { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 48px; color: #FDF8F0; background: #2E6B4F; padding: 40px 72px; border-radius: 100px; position: relative; z-index: 10; }
        .cta-glow { position: absolute; width: 500px; height: 250px; background: rgba(46,107,79,0.15); border-radius: 100px; filter: blur(80px); z-index: 1; }
        .cta-url { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 34px; color: #F4A742; margin-top: 40px; position: relative; z-index: 10; }
        .bone { position: absolute; width: 60px; height: 24px; background: rgba(244,167,66,0.12); border-radius: 12px; z-index: 2; }
        .bone::before, .bone::after { content: ''; position: absolute; width: 20px; height: 20px; background: rgba(244,167,66,0.12); border-radius: 50%; top: 2px; }
        .bone::before { left: -6px; }
        .bone::after { right: -6px; }
    </style>
</head>
<body>
    <div id="root" data-composition-id="pawesome-ad" data-start="0" data-duration="14" data-width="1080" data-height="1920">

        <!-- SCENE 1: Hook — 0s to 3.5s -->
        <div id="s1" class="clip scene" data-start="0" data-duration="3.5" data-track-index="1"
             style="background: linear-gradient(180deg, #FDF8F0 0%, #F5EFE3 100%);">
            <div class="orb" id="s1-orb1" style="width: 500px; height: 500px; top: 300px; left: -100px; background: rgba(46,107,79,0.1);"></div>
            <div class="orb" id="s1-orb2" style="width: 400px; height: 400px; bottom: 300px; right: -80px; background: rgba(244,167,66,0.12);"></div>
            <div class="paw" id="s1-paw1" style="top: 250px; left: 120px; transform: rotate(-15deg);">&#128062;</div>
            <div class="paw" id="s1-paw2" style="top: 450px; right: 150px; transform: rotate(20deg);">&#128062;</div>
            <div class="paw" id="s1-paw3" style="bottom: 350px; left: 200px; transform: rotate(-30deg);">&#128062;</div>
            <div class="paw" id="s1-paw4" style="bottom: 250px; right: 100px; transform: rotate(10deg);">&#128062;</div>
            <div class="headline" id="s1-h1">Your dog</div>
            <div class="headline" id="s1-h2">deserves the</div>
            <div class="headline orange" id="s1-h3" style="font-size: 110px;">best walk.</div>
        </div>

        <!-- SCENE 2: What we do — 3.5s to 7s -->
        <div id="s2" class="clip scene" data-start="3.5" data-duration="3.5" data-track-index="2"
             style="background: #FDF8F0;">
            <div class="orb" id="s2-orb" style="width: 600px; height: 600px; top: 500px; left: 200px; background: rgba(46,107,79,0.1);"></div>
            <div class="bone" id="s2-bone1" style="top: 300px; left: 120px; transform: rotate(30deg);"></div>
            <div class="bone" id="s2-bone2" style="bottom: 350px; right: 100px; transform: rotate(-20deg);"></div>
            <div class="headline green" id="s2-h1">Daily walks.</div>
            <div class="headline green" id="s2-h2">Adventure hikes.</div>
            <div class="headline orange" id="s2-h3">Puppy visits.</div>
            <div class="subtext" id="s2-sub">Brisbane Northside's most<br>trusted dog walking service</div>
        </div>

        <!-- SCENE 3: Trust — 7s to 10.5s -->
        <div id="s3" class="clip scene" data-start="7" data-duration="3.5" data-track-index="3"
             style="background: linear-gradient(180deg, #F5EFE3 0%, #FDF8F0 100%);">
            <div class="orb" id="s3-orb" style="width: 500px; height: 500px; top: 600px; right: -80px; background: rgba(244,167,66,0.12);"></div>
            <div class="dot-trail" id="s3-dt1" style="top: 350px; left: 200px;"></div>
            <div class="dot-trail" id="s3-dt2" style="top: 500px; left: 350px;"></div>
            <div class="dot-trail" id="s3-dt3" style="top: 400px; right: 250px;"></div>
            <div class="headline" id="s3-h1" style="margin-bottom: 50px;">What you <span class="green">get</span></div>
            <div class="pill" id="s3-p1">GPS-tracked walks</div>
            <div class="pill" id="s3-p2">Photo updates</div>
            <div class="pill" id="s3-p3">Insured & reliable</div>
            <div class="pill" id="s3-p4">First walk free</div>
        </div>

        <!-- SCENE 4: CTA — 10.5s to 14s -->
        <div id="s4" class="clip scene" data-start="10.5" data-duration="3.5" data-track-index="4"
             style="background: #FDF8F0;">
            <div class="cta-glow" id="s4-glow" style="top: 800px; left: 290px;"></div>
            <div class="orb" id="s4-orb" style="width: 400px; height: 400px; top: 400px; right: -100px; background: rgba(46,107,79,0.1);"></div>
            <div class="headline" id="s4-h1" style="margin-bottom: 20px;">Book a</div>
            <div class="headline green" id="s4-h2" style="font-size: 110px; margin-bottom: 50px;">free walk.</div>
            <div class="cta-button" id="s4-btn">Book Now</div>
            <div class="cta-url" id="s4-url">pawesomewalkers.com.au</div>
        </div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // S1
        tl.from("#s1-orb1", { x: -200, opacity: 0, duration: 1.5, ease: "power1.out" }, 0);
        tl.from("#s1-orb2", { x: 200, opacity: 0, duration: 1.5, ease: "power1.out" }, 0.2);
        tl.from("#s1-paw1", { scale: 0, rotation: -60, duration: 0.5, ease: "back.out(2)" }, 0.2);
        tl.from("#s1-paw2", { scale: 0, rotation: 60, duration: 0.5, ease: "back.out(2)" }, 0.4);
        tl.from("#s1-paw3", { scale: 0, rotation: -40, duration: 0.5, ease: "back.out(2)" }, 0.6);
        tl.from("#s1-paw4", { scale: 0, rotation: 40, duration: 0.5, ease: "back.out(2)" }, 0.8);
        tl.from("#s1-h1", { y: 60, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.3);
        tl.from("#s1-h2", { y: 60, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.5);
        tl.from("#s1-h3", { scale: 0.5, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 0.8);

        // S2
        tl.from("#s2-orb", { scale: 0.3, opacity: 0, duration: 1.5, ease: "power2.out" }, 3.5);
        tl.from("#s2-bone1", { scale: 0, rotation: -60, opacity: 0, duration: 0.6, ease: "back.out(2)" }, 3.7);
        tl.from("#s2-bone2", { scale: 0, rotation: 60, opacity: 0, duration: 0.6, ease: "back.out(2)" }, 3.9);
        tl.from("#s2-h1", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 3.8);
        tl.from("#s2-h2", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 4.1);
        tl.from("#s2-h3", { x: -80, opacity: 0, duration: 0.5, ease: "power3.out" }, 4.4);
        tl.from("#s2-sub", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 4.8);

        // S3
        tl.from("#s3-orb", { x: 200, opacity: 0, duration: 1.5, ease: "power1.out" }, 7);
        tl.from("#s3-dt1", { scale: 0, duration: 0.3, ease: "back.out(3)" }, 7.2);
        tl.from("#s3-dt2", { scale: 0, duration: 0.3, ease: "back.out(3)" }, 7.4);
        tl.from("#s3-dt3", { scale: 0, duration: 0.3, ease: "back.out(3)" }, 7.6);
        tl.from("#s3-h1", { y: 40, opacity: 0, duration: 0.5, ease: "power3.out" }, 7.3);
        tl.from("#s3-p1", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 7.7);
        tl.from("#s3-p2", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 8.0);
        tl.from("#s3-p3", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 8.3);
        tl.from("#s3-p4", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, 8.6);

        // S4
        tl.from("#s4-glow", { opacity: 0, scale: 0.5, duration: 1, ease: "power2.out" }, 10.5);
        tl.from("#s4-orb", { x: 100, opacity: 0, duration: 1.5, ease: "power1.out" }, 10.5);
        tl.from("#s4-h1", { y: 40, opacity: 0, duration: 0.5, ease: "power3.out" }, 10.7);
        tl.from("#s4-h2", { scale: 0.5, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 11.0);
        tl.from("#s4-btn", { scale: 0.5, opacity: 0, duration: 0.6, ease: "back.out(1.7)" }, 11.5);
        tl.from("#s4-url", { y: 30, opacity: 0, duration: 0.4, ease: "power2.out" }, 12.0);
        tl.to("#s4-btn", { scale: 1.05, duration: 0.5, repeat: 3, yoyo: true, ease: "power1.inOut" }, 12.5);

        window.__timelines["pawesome-ad"] = tl;
    </script>
</body>
</html>
