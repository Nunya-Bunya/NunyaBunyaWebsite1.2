<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
<style>
  .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--subtle); }
  .tab {
    padding: 12px 24px; font-family: var(--font-heading); font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; color: var(--muted);
    border-bottom: 3px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--white); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .tab .badge-count {
    display: inline-block; background: rgba(0,229,204,0.15); color: var(--teal);
    padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; font-weight: 500;
  }
  .tab .badge-count.magenta { background: rgba(255,45,120,0.15); color: var(--magenta); }

  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
  .toolbar input {
    background: var(--dark2); border: 1px solid var(--subtle); color: var(--white);
    padding: 10px 16px; border-radius: 8px; font-size: 14px; width: 300px; font-family: var(--font-body);
  }
  .toolbar input::placeholder { color: #555; }
  .toolbar input:focus { outline: none; border-color: var(--teal); }
  .btn-outline {
    background: transparent; color: var(--teal); border: 1px solid var(--teal); padding: 10px 20px;
    border-radius: 8px; font-family: var(--font-heading); font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s;
  }
  .btn-outline:hover { background: rgba(0,229,204,0.1); }

  table { width: 100%; border-collapse: collapse; background: var(--dark2); border-radius: 12px; overflow: hidden; }
  thead th {
    background: var(--dark3); padding: 14px 20px; text-align: left;
    font-family: var(--font-heading); font-weight: 700; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--subtle);
  }
  tbody td { padding: 14px 20px; font-size: 14px; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.04); font-weight: 300; }
  tbody tr:hover { background: rgba(0,229,204,0.03); }
  .source-badge { display: inline-block; background: rgba(0,229,204,0.1); color: var(--teal); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .source-badge.contact { background: rgba(255,45,120,0.1); color: var(--magenta); }
  .msg-preview { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); font-size: 13px; cursor: pointer; }
  .pkg-badge { display: inline-block; background: rgba(255,183,0,0.12); color: #FFB800; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }

  .msg-full { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
  .msg-full.show { display: flex; }
  .msg-card {
    background: var(--dark2); border: 1px solid var(--subtle); border-radius: 16px;
    padding: 36px; max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto;
  }
  .msg-card h3 { font-family: var(--font-heading); font-weight: 700; font-size: 18px; text-transform: uppercase; margin-bottom: 4px; }
  .msg-card .meta { color: var(--muted); font-size: 13px; margin-bottom: 20px; font-weight: 300; }
  .msg-card .body { color: var(--white); font-size: 14px; line-height: 1.7; font-weight: 300; white-space: pre-wrap; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1>Leads & <span>Messages</span></h1>
        <div class="date" id="dateLabel"></div>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card"><div class="num" id="totalLeads">0</div><div class="label">Total Leads</div></div>
      <div class="kpi-card magenta"><div class="num" id="totalMessages">0</div><div class="label">Messages</div></div>
      <div class="kpi-card"><div class="num" id="todayLeads">0</div><div class="label">Today</div></div>
      <div class="kpi-card"><div class="num" id="weekLeads">0</div><div class="label">This Week</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('leads')">Email List <span class="badge-count" id="leadsCount">0</span></button>
      <button class="tab" onclick="switchTab('messages')">Messages <span class="badge-count magenta" id="messagesCount">0</span></button>
    </div>

    <!-- Leads Tab -->
    <div id="tab-leads" class="tab-content active">
      <div class="toolbar">
        <input type="text" id="searchLeads" placeholder="Search leads by name or email..." oninput="filterLeads()">
        <button class="btn-outline" onclick="exportCSV()">Export CSV</button>
        <button class="btn-outline" onclick="refreshAll()">Refresh</button>
      </div>
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Source</th><th>Date</th></tr></thead>
        <tbody id="leadsBody"></tbody>
      </table>
      <div class="empty-state" id="emptyLeads" style="display:none;">
        <div class="icon">&#128236;</div>
        <p>No leads yet. Share your lead magnet link to start collecting emails!</p>
      </div>
    </div>

    <!-- Messages Tab -->
    <div id="tab-messages" class="tab-content">
      <div class="toolbar">
        <input type="text" id="searchMessages" placeholder="Search messages..." oninput="filterMessages()">
        <button class="btn-outline" onclick="refreshAll()">Refresh</button>
      </div>
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Package</th><th>Message</th><th>Date</th></tr></thead>
        <tbody id="messagesBody"></tbody>
      </table>
      <div class="empty-state" id="emptyMessages" style="display:none;">
        <div class="icon">&#128172;</div>
        <p>No messages yet. Contact form submissions will appear here.</p>
      </div>
    </div>

    <div class="loading" id="loading"><div class="spinner"></div><p>Loading leads...</p></div>
  </main>
</div>

<!-- Message Modal -->
<div class="msg-full" id="msgModal" onclick="if(event.target===this)closeMsg()">
  <div class="msg-card">
    <h3 id="modalName"></h3>
    <div class="meta" id="modalMeta"></div>
    <div class="body" id="modalBody"></div>
    <button class="btn-outline" style="margin-top:20px" onclick="closeMsg()">Close</button>
  </div>
</div>

<script src="/nb-admin-shared.js"></script>
<script>
  let allLeads = [];
  let allContacts = [];

  async function init() {
    const ok = await NB_ADMIN.checkAuth();
    if (!ok) return;
    NB_ADMIN.renderSidebar('leads');
    document.getElementById('dateLabel').textContent = NB_ADMIN.formatDateFull(new Date());
    await refreshAll();
    document.getElementById('loading').style.display = 'none';
  }

  async function refreshAll() {
    try {
      const [leadsData, contactsData] = await Promise.all([
        NB_ADMIN.apiFetch('data?action=service-leads'),
        NB_ADMIN.apiFetch('data?action=service-contacts'),
      ]);
      allLeads = leadsData?.leads || [];
      allContacts = contactsData?.contacts || [];
      renderLeads(allLeads);
      renderMessages(allContacts);
      updateStats();
    } catch (err) {
      console.error('Failed to load leads:', err);
      allLeads = [];
      allContacts = [];
      renderLeads([]);
      renderMessages([]);
      updateStats();
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  }

  function renderLeads(leads) {
    const tbody = document.getElementById('leadsBody');
    const empty = document.getElementById('emptyLeads');
    if (!leads || leads.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = leads.map((l, i) => {
      const dateStr = fmtDate(l.created_at);
      const source = l.source || 'direct';
      const cls = source === 'contact-form' ? 'source-badge contact' : 'source-badge';
      return `<tr><td>${i+1}</td><td>${esc(l.name)}</td><td>${esc(l.email)}</td><td><span class="${cls}">${esc(source)}</span></td><td>${dateStr}</td></tr>`;
    }).join('');
  }

  function renderMessages(contacts) {
    const tbody = document.getElementById('messagesBody');
    const empty = document.getElementById('emptyMessages');
    if (!contacts || contacts.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = contacts.map((c, i) => {
      const dateStr = fmtDate(c.created_at);
      const pkg = c.package ? `<span class="pkg-badge">${esc(c.package)}</span>` : '<span style="color:#555">--</span>';
      const msgPreview = c.message ? `<span class="msg-preview" onclick='showMsg(${i})'>${esc(c.message)}</span>` : '<span style="color:#555">No message</span>';
      return `<tr><td>${i+1}</td><td>${esc(c.name)}</td><td>${esc(c.email)}</td><td>${esc(c.phone||'--')}</td><td>${pkg}</td><td>${msgPreview}</td><td>${dateStr}</td></tr>`;
    }).join('');
  }

  function updateStats() {
    document.getElementById('totalLeads').textContent = allLeads.length;
    document.getElementById('totalMessages').textContent = allContacts.length;
    document.getElementById('leadsCount').textContent = allLeads.length;
    document.getElementById('messagesCount').textContent = allContacts.length;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weekAgo = new Date(today.getTime() - 7*24*60*60*1000);
    const allItems = [...allLeads, ...allContacts];
    document.getElementById('todayLeads').textContent = allItems.filter(l => new Date(l.created_at) >= today).length;
    document.getElementById('weekLeads').textContent = allItems.filter(l => new Date(l.created_at) >= weekAgo).length;
  }

  function filterLeads() {
    const q = document.getElementById('searchLeads').value.toLowerCase();
    renderLeads(allLeads.filter(l => (l.name||'').toLowerCase().includes(q) || (l.email||'').toLowerCase().includes(q)));
  }

  function filterMessages() {
    const q = document.getElementById('searchMessages').value.toLowerCase();
    renderMessages(allContacts.filter(c =>
      (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || (c.message||'').toLowerCase().includes(q)
    ));
  }

  function exportCSV() {
    if (!allLeads.length) return;
    const header = 'Name,Email,Source,Date\n';
    const rows = allLeads.map(l => `"${l.name}","${l.email}","${l.source||'direct'}","${l.created_at}"`).join('\n');
    const blob = new Blob([header + rows], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `leads-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function showMsg(idx) {
    const c = allContacts[idx];
    if (!c) return;
    document.getElementById('modalName').textContent = c.name;
    document.getElementById('modalMeta').textContent = `${c.email}${c.phone?' | '+c.phone:''}${c.package?' | Package: '+c.package:''} | ${fmtDate(c.created_at)}`;
    document.getElementById('modalBody').textContent = c.message || 'No message provided.';
    document.getElementById('msgModal').classList.add('show');
  }

  function closeMsg() { document.getElementById('msgModal').classList.remove('show'); }

  function fmtDate(d) {
    if (!d) return '--';
    return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
  }

  function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMsg(); });

  init();
</script>
</body>
</html>
