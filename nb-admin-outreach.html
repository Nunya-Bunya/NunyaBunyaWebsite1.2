<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Engine | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
<style>
/* Stats Row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--dark2); border: 1px solid var(--subtle); padding: 16px; text-align: center; }
.stat-num { font-family: var(--font-heading); font-weight: 900; font-size: 28px; color: var(--teal); }
.stat-label { font-family: var(--font-heading); font-weight: 700; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

/* Platform Badge */
.platform-badge { font-family: var(--font-heading); font-weight: 700; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; display: inline-block; margin-right: 4px; }
.platform-badge.twitter { background: rgba(29,155,240,0.1); color: #1DA1F2; }
.platform-badge.reddit { background: rgba(255,69,0,0.1); color: #FF4500; }
.platform-badge.bluesky { background: rgba(0,133,255,0.1); color: #0085FF; }
.platform-badge.facebook { background: rgba(66,103,178,0.1); color: #4267B2; }
.platform-badge.instagram { background: rgba(225,48,108,0.1); color: #E1306C; }
.platform-badge.threads { background: rgba(0,0,0,0.1); color: #999; }
.platform-badge.linkedin { background: rgba(0,119,181,0.1); color: #0077B5; }
.platform-badge.discord { background: rgba(88,101,242,0.1); color: #5865F2; }
.platform-badge.telegram { background: rgba(38,166,154,0.1); color: #26A69A; }
.platform-badge.mastodon { background: rgba(99,100,255,0.1); color: #6364FF; }
.platform-badge.discourse { background: rgba(0,174,239,0.1); color: #00AEEF; }

/* Post Card */
.o-card { background: var(--dark2); border: 1px solid var(--subtle); padding: 20px; margin-bottom: 12px; transition: border-color 0.2s; }
.o-card:hover { border-color: rgba(0,229,204,0.15); }
.o-card.draft { border-left: 3px solid #F59E0B; }
.o-card.approved { border-left: 3px solid var(--teal); }
.o-card.posted { border-left: 3px solid #22C55E; }
.o-card.failed { border-left: 3px solid #EF4444; }
.o-card.scheduled { border-left: 3px solid #6366F1; }
.o-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.o-content { font-size: 14px; color: var(--white); line-height: 1.6; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }
.o-meta { font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
.o-metrics { display: flex; gap: 16px; margin-bottom: 12px; }
.o-metric { font-size: 12px; color: var(--muted); }
.o-metric strong { color: var(--teal); }
.o-link { font-size: 11px; color: rgba(0,229,204,0.6); text-decoration: none; word-break: break-all; }
.o-link:hover { color: var(--teal); }
.o-buttons { display: flex; gap: 8px; margin-top: 12px; }
.o-btn { padding: 8px 20px; font-family: var(--font-heading); font-weight: 700; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; border: none; cursor: pointer; }
.o-btn.approve { background: var(--teal); color: var(--dark); }
.o-btn.reject { background: transparent; color: #EF4444; border: 1px solid #EF4444; }
.o-btn.edit { background: transparent; color: var(--muted); border: 1px solid var(--subtle); }
.o-btn.retry { background: rgba(99,102,241,0.15); color: #6366F1; border: 1px solid #6366F1; }
.o-status { font-family: var(--font-heading); font-weight: 700; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 3px 8px; }
.o-status.draft { background: rgba(245,158,11,0.15); color: #F59E0B; }
.o-status.approved { background: rgba(0,229,204,0.1); color: var(--teal); }
.o-status.posted { background: rgba(34,197,94,0.1); color: #22C55E; }
.o-status.failed { background: rgba(239,68,68,0.1); color: #EF4444; }
.o-status.scheduled { background: rgba(99,102,241,0.1); color: #6366F1; }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-btn { padding: 8px 16px; font-family: var(--font-heading); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: var(--dark2); border: 1px solid var(--subtle); color: var(--muted); cursor: pointer; }
.filter-btn.active { border-color: var(--teal); color: var(--teal); }
.count-badge { background: var(--teal); color: var(--dark); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }

/* Bulk actions */
.bulk-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.bulk-bar label { font-size: 12px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; }

/* Edit modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal-box { background: var(--dark2); border: 1px solid var(--subtle); padding: 24px; width: 90%; max-width: 600px; }
.modal-box textarea { width: 100%; min-height: 150px; background: var(--dark3); border: 1px solid var(--subtle); color: var(--white); font-family: var(--font-body); font-size: 14px; padding: 12px; resize: vertical; }
.modal-box .o-buttons { justify-content: flex-end; }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Organic <span>Engine</span></h1>
      <div id="headerMeta" style="font-size:14px;color:var(--muted)"></div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="filter-bar" id="filterBar"></div>

    <div class="bulk-bar" id="bulkBar" style="display:none">
      <label><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> Select All</label>
      <button class="o-btn approve" onclick="bulkApprove()">Approve Selected</button>
      <button class="o-btn reject" onclick="bulkReject()">Reject Selected</button>
    </div>

    <div id="postList"></div>
    <div id="empty" style="display:none;text-align:center;padding:60px;color:var(--muted);">No outreach posts yet. Run the Organic Engine to generate posts.</div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3 style="font-family:var(--font-heading);font-weight:900;text-transform:uppercase;margin-bottom:16px;">Edit Post</h3>
    <textarea id="editText"></textarea>
    <div class="o-buttons" style="margin-top:12px;">
      <button class="o-btn edit" onclick="closeEdit()">Cancel</button>
      <button class="o-btn approve" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script src="/nb-admin-shared.js"></script>
<script>
// Admin credentials loaded from environment
const SUPABASE_URL = 'SUPABASE_URL_PLACEHOLDER';
const SUPABASE_KEY = 'SUPABASE_KEY_PLACEHOLDER';

let allPosts = [];
let activeFilter = 'all';
let selectedIds = new Set();
let editingId = null;

async function supaGet(query) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}

async function supaPatch(id, data) {
  await fetch(`${SUPABASE_URL}/rest/v1/outreach_posts?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(data)
  });
}

async function loadPosts() {
  allPosts = await supaGet('outreach_posts?order=created_at.desc&limit=200');
  renderStats();
  renderFilters();
  renderPosts();
}

function renderStats() {
  const total = allPosts.length;
  const draft = allPosts.filter(p => p.status === 'draft').length;
  const approved = allPosts.filter(p => p.status === 'approved').length;
  const posted = allPosts.filter(p => p.status === 'posted').length;
  const failed = allPosts.filter(p => p.status === 'failed').length;
  const clicks = allPosts.reduce((s, p) => s + (p.clicks || 0), 0);
  const impressions = allPosts.reduce((s, p) => s + (p.impressions || 0), 0);

  document.getElementById('headerMeta').textContent = `${draft} pending review`;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Posts</div></div>
    <div class="stat-card"><div class="stat-num">${draft}</div><div class="stat-label">Drafts</div></div>
    <div class="stat-card"><div class="stat-num">${posted}</div><div class="stat-label">Posted</div></div>
    <div class="stat-card"><div class="stat-num">${failed}</div><div class="stat-label">Failed</div></div>
    <div class="stat-card"><div class="stat-num">${clicks}</div><div class="stat-label">Clicks</div></div>
    <div class="stat-card"><div class="stat-num">${impressions}</div><div class="stat-label">Impressions</div></div>
  `;
}

function renderFilters() {
  const platforms = {};
  const statuses = {};
  allPosts.forEach(p => {
    platforms[p.platform] = (platforms[p.platform] || 0) + 1;
    statuses[p.status] = (statuses[p.status] || 0) + 1;
  });

  let html = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All<span class="count-badge">${allPosts.length}</span></button>`;

  // Status filters
  for (const [status, count] of Object.entries(statuses)) {
    html += `<button class="filter-btn ${activeFilter === 'status:'+status ? 'active' : ''}" onclick="setFilter('status:${status}')">${status}<span class="count-badge">${count}</span></button>`;
  }
  html += '<span style="width:8px"></span>';
  // Platform filters
  for (const [platform, count] of Object.entries(platforms)) {
    html += `<button class="filter-btn ${activeFilter === platform ? 'active' : ''}" onclick="setFilter('${platform}')">${platform}<span class="count-badge">${count}</span></button>`;
  }
  document.getElementById('filterBar').innerHTML = html;

  // Show bulk bar for drafts
  const draftCount = allPosts.filter(p => p.status === 'draft').length;
  document.getElementById('bulkBar').style.display = draftCount > 0 ? 'flex' : 'none';
}

function setFilter(f) { activeFilter = f; selectedIds.clear(); renderFilters(); renderPosts(); }

function getFilteredPosts() {
  if (activeFilter === 'all') return allPosts;
  if (activeFilter.startsWith('status:')) return allPosts.filter(p => p.status === activeFilter.split(':')[1]);
  return allPosts.filter(p => p.platform === activeFilter);
}

function renderPosts() {
  const posts = getFilteredPosts();
  const list = document.getElementById('postList');
  const empty = document.getElementById('empty');

  if (!posts.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = posts.map(p => {
    const date = new Date(p.created_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    const postedDate = p.posted_at ? new Date(p.posted_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '';
    const checked = selectedIds.has(p.id) ? 'checked' : '';

    const metricsHtml = p.status === 'posted' ? `
      <div class="o-metrics">
        <div class="o-metric"><strong>${p.clicks || 0}</strong> clicks</div>
        <div class="o-metric"><strong>${p.likes || 0}</strong> likes</div>
        <div class="o-metric"><strong>${p.comments || 0}</strong> comments</div>
        <div class="o-metric"><strong>${p.shares || 0}</strong> shares</div>
        <div class="o-metric"><strong>${p.impressions || 0}</strong> impressions</div>
      </div>` : '';

    const linkHtml = p.platform_post_url ? `<a class="o-link" href="${p.platform_post_url}" target="_blank">View live post →</a>` : '';
    const shlinkHtml = p.shlink_short_url ? `<a class="o-link" href="${p.shlink_short_url}" target="_blank" style="margin-left:12px">${p.shlink_short_url}</a>` : '';
    const errorHtml = p.error_message ? `<div style="font-size:12px;color:#EF4444;margin-top:6px;">Error: ${p.error_message}</div>` : '';

    let buttonsHtml = '';
    if (p.status === 'draft') {
      buttonsHtml = `<div class="o-buttons">
        <label style="font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;margin-right:auto;">
          <input type="checkbox" ${checked} onchange="toggleSelect('${p.id}')">
        </label>
        <button class="o-btn edit" onclick="openEdit('${p.id}')">Edit</button>
        <button class="o-btn approve" onclick="approvePost('${p.id}')">Approve</button>
        <button class="o-btn reject" onclick="rejectPost('${p.id}')">Reject</button>
      </div>`;
    } else if (p.status === 'failed') {
      buttonsHtml = `<div class="o-buttons">
        <button class="o-btn retry" onclick="retryPost('${p.id}')">Retry</button>
        <button class="o-btn reject" onclick="rejectPost('${p.id}')">Discard</button>
      </div>`;
    }

    return `
      <div class="o-card ${p.status}">
        <div class="o-header">
          <div>
            <span class="platform-badge ${p.platform}">${p.platform}</span>
            <span class="o-status ${p.status}">${p.status}</span>
            ${p.campaign_id ? `<span style="font-size:10px;color:var(--muted);margin-left:8px;">${p.campaign_id}</span>` : ''}
          </div>
          <div class="o-meta">${p.brand} · ${date}${postedDate ? ' · Posted ' + postedDate : ''}</div>
        </div>
        <div class="o-content">${escHtml(p.content_text)}</div>
        ${metricsHtml}
        <div>${linkHtml}${shlinkHtml}</div>
        ${errorHtml}
        ${buttonsHtml}
      </div>`;
  }).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
}

function toggleSelectAll() {
  const drafts = getFilteredPosts().filter(p => p.status === 'draft');
  if (selectedIds.size === drafts.length) { selectedIds.clear(); }
  else { drafts.forEach(p => selectedIds.add(p.id)); }
  renderPosts();
}

async function approvePost(id) {
  if (!confirm('Approve this post for the next posting cycle?')) return;
  await supaPatch(id, { status: 'approved', approved_at: new Date().toISOString(), approved_by: 'admin' });
  loadPosts();
}

async function rejectPost(id) {
  await supaPatch(id, { status: 'rejected' });
  loadPosts();
}

async function retryPost(id) {
  await supaPatch(id, { status: 'approved', error_message: null, retry_count: 0 });
  loadPosts();
}

async function bulkApprove() {
  if (!selectedIds.size) return;
  if (!confirm(`Approve ${selectedIds.size} posts?`)) return;
  const now = new Date().toISOString();
  for (const id of selectedIds) {
    await supaPatch(id, { status: 'approved', approved_at: now, approved_by: 'admin' });
  }
  selectedIds.clear();
  loadPosts();
}

async function bulkReject() {
  if (!selectedIds.size) return;
  if (!confirm(`Reject ${selectedIds.size} posts?`)) return;
  for (const id of selectedIds) {
    await supaPatch(id, { status: 'rejected' });
  }
  selectedIds.clear();
  loadPosts();
}

function openEdit(id) {
  editingId = id;
  const post = allPosts.find(p => p.id === id);
  document.getElementById('editText').value = post.content_text;
  document.getElementById('editModal').classList.add('active');
}

function closeEdit() {
  editingId = null;
  document.getElementById('editModal').classList.remove('active');
}

async function saveEdit() {
  const text = document.getElementById('editText').value.trim();
  if (!text || !editingId) return;
  await supaPatch(editingId, { content_text: text });
  closeEdit();
  loadPosts();
}

loadPosts();
</script>
</body>
</html>
