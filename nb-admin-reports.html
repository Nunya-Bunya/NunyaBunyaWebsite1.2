<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports | NBHQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="/images/logo-icon-white.png" type="image/png">
<link rel="stylesheet" href="/nb-admin-style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Reports & <span>Dashboards</span></h1>
    </div>

    <!-- Tab switcher -->
    <div style="display:flex;gap:4px;margin-bottom:24px">
      <button class="an-period-btn active" id="tabDashboards" onclick="switchTab('dashboards')" style="padding:10px 20px;border-radius:8px;border:1px solid var(--subtle);background:rgba(0,229,204,0.05);color:var(--teal);font-size:13px;cursor:pointer;font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:0.04em">Dashboards</button>
      <button class="an-period-btn" id="tabWeekly" onclick="switchTab('weekly')" style="padding:10px 20px;border-radius:8px;border:1px solid var(--subtle);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:0.04em">Weekly Reports</button>
      <button class="an-period-btn" id="tabMonthly" onclick="switchTab('monthly')" style="padding:10px 20px;border-radius:8px;border:1px solid var(--subtle);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:0.04em">Monthly Reports</button>
      <button class="an-period-btn" id="tabReports" onclick="switchTab('reports')" style="padding:10px 20px;border-radius:8px;border:1px solid var(--subtle);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:0.04em">Client Reports</button>
    </div>

    <!-- Dashboards Tab -->
    <div id="dashboardsTab">
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="dash-btn active" onclick="loadDashboard('leads')" id="btnLeads" style="padding:8px 16px;border-radius:8px;border:1px solid var(--teal);background:rgba(0,229,204,0.08);color:var(--teal);font-size:12px;cursor:pointer;font-family:var(--font-heading);font-weight:700;text-transform:uppercase;letter-spacing:0.04em">Lead Tracker</button>
        <button class="dash-btn" onclick="loadDashboard('content')" id="btnContent" style="padding:8px 16px;border-radius:8px;border:1px solid var(--subtle);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font-heading);font-weight:700;text-transform:uppercase;letter-spacing:0.04em">Content & Outreach</button>
        <button class="dash-btn" onclick="loadDashboard('ops')" id="btnOps" style="padding:8px 16px;border-radius:8px;border:1px solid var(--subtle);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font-heading);font-weight:700;text-transform:uppercase;letter-spacing:0.04em">Operations</button>
        <a href="https://reports.nunyabunya.com" target="_blank" style="padding:8px 16px;border-radius:8px;border:1px solid var(--subtle);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font-heading);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;text-decoration:none;display:flex;align-items:center;gap:4px">Open Metabase &#8599;</a>
      </div>
      <div style="background:var(--dark2);border:1px solid var(--subtle);border-radius:12px;overflow:hidden">
        <iframe id="dashboardFrame" src="https://reports.nunyabunya.com/public/dashboard/2c0bbd87-7601-4faa-9165-f19a68019394" style="width:100%;height:800px;border:none;background:#fff" loading="lazy"></iframe>
      </div>
    </div>

    <!-- Weekly Reports Tab -->
    <div id="weeklyTab" style="display:none">
      <div id="weeklyList"></div>
      <div class="empty-state" id="weeklyEmpty" style="display:none"><div class="icon">&#128200;</div><p>No weekly reports yet.</p></div>
    </div>

    <!-- Monthly Reports Tab -->
    <div id="monthlyTab" style="display:none">
      <div id="monthlyList"></div>
      <div class="empty-state" id="monthlyEmpty" style="display:none"><div class="icon">&#128200;</div><p>No monthly reports yet.</p></div>
    </div>

    <!-- Client Reports Tab -->
    <div id="reportsTab" style="display:none">
    <div class="toolbar">
      <select id="clientFilter" onchange="loadReports()">
        <option value="">All Clients</option>
      </select>
      <select id="typeFilter" onchange="loadReports()">
        <option value="">All Types</option>
        <option value="weekly">Weekly Reports</option>
        <option value="seo">SEO Reports</option>
        <option value="ads">Ads Reports</option>
      </select>
    </div>

    <div id="reportsList"></div>
    </div>
    <div class="loading" id="loading"><div class="spinner"></div><p>Loading reports...</p></div>
    <div class="empty-state" id="empty" style="display:none"><div class="icon">&#128200;</div><p>No reports found.</p></div>
  </main>
</div>

<!-- Report Detail Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal-card large">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 id="reportTitle"></h3>
      <button class="btn-outline btn-small" onclick="closeReport()">Close</button>
    </div>
    <div id="reportMeta" class="meta"></div>
    <div id="reportBody" class="content-preview"></div>
  </div>
</div>

<script src="/nb-admin-shared.js"></script>
<script>
  const DASHBOARDS = {
    leads: 'https://reports.nunyabunya.com/public/dashboard/2c0bbd87-7601-4faa-9165-f19a68019394',
    content: 'https://reports.nunyabunya.com/public/dashboard/a26b39b1-c2db-4097-af4f-60432f845890',
    ops: 'https://reports.nunyabunya.com/public/dashboard/91c609e3-bfcd-4044-80f5-0cde047ee343',
  };

  const WEEKLY_REPORTS = [
    { date: '2026-05-01', title: 'Weekly Empire Report — Week of 24 Apr', href: '/reports/weekly/2026-05-01.html' },
    { date: '2026-04-27', title: 'First Edition — Full Inventory', href: '/reports/weekly/2026-04-27.html' },
  ];

  const MONTHLY_REPORTS = [
    { date: '2026-05-01', title: 'Monthly Empire Report — May 2026 (Baseline)', href: '/reports/monthly/2026-05.html' },
  ];

  function switchTab(tab) {
    const tabs = ['dashboards', 'weekly', 'monthly', 'reports'];
    const tabIds = { dashboards: 'dashboardsTab', weekly: 'weeklyTab', monthly: 'monthlyTab', reports: 'reportsTab' };
    const btnIds = { dashboards: 'tabDashboards', weekly: 'tabWeekly', monthly: 'tabMonthly', reports: 'tabReports' };

    tabs.forEach(t => {
      const el = document.getElementById(tabIds[t]);
      if (el) el.style.display = t === tab ? '' : 'none';
      const btn = document.getElementById(btnIds[t]);
      if (btn) {
        btn.style.color = t === tab ? 'var(--teal)' : 'var(--muted)';
        btn.style.borderColor = t === tab ? 'var(--teal)' : 'var(--subtle)';
        btn.style.background = t === tab ? 'rgba(0,229,204,0.05)' : 'transparent';
      }
    });

    if (tab === 'weekly') renderWeeklyReports();
    if (tab === 'monthly') renderMonthlyReports();
  }

  function renderWeeklyReports() {
    const list = document.getElementById('weeklyList');
    if (!WEEKLY_REPORTS.length) {
      document.getElementById('weeklyEmpty').style.display = 'block';
      return;
    }
    list.innerHTML = WEEKLY_REPORTS.map(r => `
      <a href="${r.href}" style="text-decoration:none;display:block">
        <div class="card" style="margin-bottom:12px;cursor:pointer;border-left:3px solid var(--teal);padding:16px 20px;background:var(--dark3);border-radius:0 12px 12px 0;border-top:1px solid var(--subtle);border-right:1px solid var(--subtle);border-bottom:1px solid var(--subtle)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="background:rgba(0,229,204,0.12);color:var(--teal);font-family:var(--font-heading);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:3px 10px;border-radius:4px;margin-right:8px">Weekly</span>
              <strong style="color:var(--white)">${r.title}</strong>
            </div>
            <span style="color:var(--muted);font-size:12px">${r.date}</span>
          </div>
        </div>
      </a>
    `).join('');
  }

  function renderMonthlyReports() {
    const list = document.getElementById('monthlyList');
    if (!MONTHLY_REPORTS.length) {
      document.getElementById('monthlyEmpty').style.display = 'block';
      return;
    }
    list.innerHTML = MONTHLY_REPORTS.map(r => `
      <a href="${r.href}" style="text-decoration:none;display:block">
        <div class="card" style="margin-bottom:12px;cursor:pointer;border-left:3px solid var(--magenta);padding:16px 20px;background:var(--dark3);border-radius:0 12px 12px 0;border-top:1px solid var(--subtle);border-right:1px solid var(--subtle);border-bottom:1px solid var(--subtle)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="background:rgba(255,45,120,0.12);color:var(--magenta);font-family:var(--font-heading);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:3px 10px;border-radius:4px;margin-right:8px">Monthly</span>
              <strong style="color:var(--white)">${r.title}</strong>
            </div>
            <span style="color:var(--muted);font-size:12px">${r.date}</span>
          </div>
        </div>
      </a>
    `).join('');
  }

  function loadDashboard(key) {
    document.getElementById('dashboardFrame').src = DASHBOARDS[key];
    document.querySelectorAll('.dash-btn').forEach(b => {
      b.style.color = 'var(--muted)';
      b.style.borderColor = 'var(--subtle)';
      b.style.background = 'transparent';
    });
    const btn = document.getElementById('btn' + key.charAt(0).toUpperCase() + key.slice(1));
    if (btn) {
      btn.style.color = 'var(--teal)';
      btn.style.borderColor = 'var(--teal)';
      btn.style.background = 'rgba(0,229,204,0.08)';
    }
  }

  async function init() {
    const ok = await NB_ADMIN.checkAuth();
    if (!ok) return;
    NB_ADMIN.renderSidebar('reports');

    const clientData = await NB_ADMIN.apiFetch('clients');
    if (clientData) {
      const sel = document.getElementById('clientFilter');
      clientData.clients.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.client_id;
        opt.textContent = c.client_name;
        sel.appendChild(opt);
      });
    }

    await loadReports();
  }

  async function loadReports() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('empty').style.display = 'none';

    const client = document.getElementById('clientFilter').value;
    const type = document.getElementById('typeFilter').value;

    let query = 'reports?limit=30';
    if (client) query += '&client=' + encodeURIComponent(client);
    if (type) query += '&type=' + encodeURIComponent(type);

    const data = await NB_ADMIN.apiFetch(query);
    document.getElementById('loading').style.display = 'none';

    const reports = data ? data.reports : [];
    if (!reports.length) {
      document.getElementById('reportsList').innerHTML = '';
      document.getElementById('empty').style.display = 'block';
      return;
    }

    const typeColors = { weekly: 'var(--teal)', seo: 'var(--purple)', ads: 'var(--yellow)' };

    document.getElementById('reportsList').innerHTML = reports.map(r => {
      const typeLabel = r.report_type || 'report';
      const color = typeColors[typeLabel] || 'var(--muted)';
      return `
        <div class="card" style="margin-bottom:12px;cursor:pointer;border-left:3px solid ${color}" onclick='viewReport(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span class="badge-type" style="background:${color}22;color:${color}">${typeLabel.toUpperCase()}</span>
              <strong style="margin-left:8px">${NB_ADMIN.esc(r.client_name || r.client_id || 'Unknown')}</strong>
            </div>
            <span style="color:var(--muted);font-size:12px">${NB_ADMIN.formatDate(r.report_date)}</span>
          </div>
          ${r.executive_summary ? `<p style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:8px;font-weight:300">${NB_ADMIN.esc(typeof r.executive_summary === 'string' ? r.executive_summary.substring(0, 200) : 'View report for details...')}</p>` : ''}
        </div>
      `;
    }).join('');
  }

  function viewReport(report) {
    document.getElementById('reportTitle').textContent = (report.report_type || 'Report').toUpperCase() + ' — ' + (report.client_name || report.client_id || '');
    document.getElementById('reportMeta').textContent = NB_ADMIN.formatDateFull(report.report_date);

    let body = '';
    if (report.executive_summary) {
      body += '<h2>Executive Summary</h2>';
      body += typeof report.executive_summary === 'string'
        ? report.executive_summary.replace(/\n/g, '<br>')
        : '<pre style="white-space:pre-wrap">' + JSON.stringify(report.executive_summary, null, 2) + '</pre>';
    }
    if (report.recommendations) {
      body += '<h2 style="margin-top:20px">Recommendations</h2>';
      body += '<pre style="white-space:pre-wrap">' + JSON.stringify(report.recommendations, null, 2) + '</pre>';
    }
    if (report.full_report) {
      body += '<h2 style="margin-top:20px">Full Report</h2>';
      body += '<pre style="white-space:pre-wrap">' + JSON.stringify(report.full_report, null, 2) + '</pre>';
    }
    if (report.keyword_opportunities) {
      body += '<h2 style="margin-top:20px">Keyword Opportunities</h2>';
      body += '<pre style="white-space:pre-wrap">' + JSON.stringify(report.keyword_opportunities, null, 2) + '</pre>';
    }

    document.getElementById('reportBody').innerHTML = body || '<p>No report content available.</p>';
    document.getElementById('reportModal').classList.add('show');
  }

  function closeReport() { document.getElementById('reportModal').classList.remove('show'); }
  document.getElementById('reportModal').addEventListener('click', function(e) { if (e.target === this) closeReport(); });

  init();
</script>
</body>
</html>
